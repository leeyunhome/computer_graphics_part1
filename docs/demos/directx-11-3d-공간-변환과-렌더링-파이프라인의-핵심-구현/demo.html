<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DirectX 11 — Source Code Blend Effect</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .dx-window {
      width: 1120px;
      background-color: #20202c;
      border: 1px solid #3f3f5f;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }
    .dx-titlebar {
      background: linear-gradient(90deg, #10101a, #0d2b45);
      padding: 8px 12px;
      font-weight: bold;
      font-size: 13px;
      border-bottom: 1px solid #3f3f5f;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .dx-title {
      color: #9cdcfe;
      font-family: 'Consolas', monospace;
    }
    .dx-controls-top {
      display: flex;
      gap: 6px;
    }
    .dx-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
    }
    .dx-btn-close { background-color: #ff5f56; }
    .dx-btn-min { background-color: #ffbd2e; }
    .dx-btn-max { background-color: #27c93f; }

    .dx-content {
      display: flex;
      padding: 15px;
      gap: 15px;
      background-color: #15151f;
    }
    .dx-canvas-container {
      border: 1px solid #3f3f5f;
      background-color: #000;
      position: relative;
    }
    canvas {
      display: block;
      width: 800px;
      height: 600px;
    }
    .dx-imgui-panel {
      flex: 1;
      background-color: #1c1c24;
      border: 1px solid #2d2d3d;
      padding: 15px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      color: #c5c5c9;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .imgui-header {
      border-bottom: 2px solid #0078d7;
      padding-bottom: 5px;
      margin-bottom: 5px;
      color: #4fc1ff;
      font-weight: bold;
      font-size: 14px;
    }
    .imgui-control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .imgui-control label {
      display: flex;
      justify-content: space-between;
      color: #858585;
    }
    .imgui-control label span {
      color: #b5cea8;
    }
    .imgui-control input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: #3a3a4a;
      height: 6px;
      outline: none;
      border-radius: 3px;
    }
    .imgui-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #0078d7;
      cursor: pointer;
      border-radius: 2px;
      border: 1px solid #569cd6;
    }
    .imgui-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .imgui-checkbox input {
      accent-color: #0078d7;
    }
    .imgui-color-picker {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .imgui-color-picker input[type="color"] {
      border: 1px solid #3f3f5f;
      background: none;
      width: 40px;
      height: 24px;
      cursor: pointer;
    }
    .status-bar {
      padding: 4px 12px;
      background-color: #10101a;
      font-size: 11px;
      font-family: 'Consolas', monospace;
      color: #6a9955;
      border-top: 1px solid #2d2d3d;
      display: flex;
      justify-content: space-between;
    }
    #error-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(20,20,30,0.95);
      color: #f44336;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: monospace;
      font-size: 16px;
      padding: 20px;
      text-align: center;
      z-index: 100;
      display: none;
    }
  </style>
</head>
<body>

  <div class="dx-window">
    <!-- DirectX 11 Windows Frame 스타일 타이틀바 -->
    <div class="dx-titlebar">
      <div class="dx-title">DirectX 11 — Source Code Blend Effect</div>
      <div class="dx-controls-top">
        <button class="dx-btn dx-btn-min"></button>
        <button class="dx-btn dx-btn-max"></button>
        <button class="dx-btn dx-btn-close"></button>
      </div>
    </div>

    <div class="dx-content">
      <!-- 렌더링 뷰포트 -->
      <div class="dx-canvas-container">
        <canvas id="gpu-canvas" width="800" height="600"></canvas>
        <div id="error-overlay">WebGPU가 지원되지 않거나 초기화에 실패했습니다.</div>
      </div>

      <!-- ImGui 스타일 컨트롤 패널 -->
      <div class="dx-imgui-panel">
        <div class="imgui-header">Pipeline Settings (UAV)</div>
        
        <div class="imgui-checkbox">
          <input type="checkbox" id="anim-enable" checked>
          <label for="anim-enable">애니메이션 활성화 (시간 갱신)</label>
        </div>

        <div class="imgui-control">
          <label>소스 이미지 가중치 <span id="val-img">1.00</span></label>
          <input type="range" id="slider-img" min="0" max="2" step="0.05" value="1.00">
        </div>

        <div class="imgui-control">
          <label>코드 매트릭스 가중치 <span id="val-code">0.70</span></label>
          <input type="range" id="slider-code" min="0" max="2" step="0.05" value="0.70">
        </div>

        <div class="imgui-control">
          <label>코드 텍스처 스케일 <span id="val-scale">60.0</span></label>
          <input type="range" id="slider-scale" min="10" max="120" step="1.0" value="60.0">
        </div>

        <div class="imgui-control">
          <label>코드 스크롤 속도 <span id="val-speed">1.50</span></label>
          <input type="range" id="slider-speed" min="0.1" max="5.0" step="0.1" value="1.50">
        </div>

        <div class="imgui-color-picker">
          <label>매트릭스 코드 색상</label>
          <input type="color" id="picker-color" value="#00ff66">
        </div>

        <div style="flex-grow: 1;"></div>
        
        <div class="imgui-header" style="border-color: #6a9955; color: #6a9955;">System Info</div>
        <div style="font-size: 11px; line-height: 1.4; color: #858585;">
          UAV: texture_storage_2d<br>
          Format: rgba8unorm<br>
          CS Threads: [numthreads(16, 16, 1)]<br>
          Shader: WGSL Compute Pass
        </div>
      </div>
    </div>

    <!-- 상태 바 -->
    <div class="status-bar">
      <div>Device: WebGPU (Direct3D 11 Feature Level 11_1 Map)</div>
      <div id="fps-display">FPS: --</div>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------------------
    // 1. WebGPU / WGSL 셰이더 코드 정의
    // -------------------------------------------------------------------------

    const COMPUTE_SHADER_SRC = `
      struct Params {
        image_intensity: f32,
        code_intensity: f32,
        time: f32,
        text_scale: f32,
        color_r: f32,
        color_g: f32,
        color_b: f32,
        _padding: f32,
      }

      @group(0) @binding(0) var src_tex: texture_2d<f32>;
      @group(0) @binding(1) var src_sampler: sampler;
      @group(0) @binding(2) var out_tex: texture_storage_2d<rgba8unorm, write>;
      @group(0) @binding(3) var<uniform> params: Params;

      // Hash function
      fn hash2(p: vec2f) -> f32 {
        return fract(sin(dot(p, vec2f(127.1, 311.7))) * 43758.5453123);
      }

      // 절차적 '소스 코드' 스타일 글자 외곽선 생성 함수
      fn get_char_brightness(char_coords: vec2f, rand_val: f32) -> f32 {
        let cell = floor(char_coords * 8.0);
        let f = fract(char_coords * 8.0);
        
        // 무작위로 다른 모양의 디지털 코드 패턴 반환
        let rand_char = fract(sin(rand_val * 982.12 + cell.x * 12.3 + cell.y * 87.4));
        if (rand_char < 0.25) {
          // 세로 기둥 선 (컴퓨터 코드 인덱스 느낌)
          return step(0.4, f.x) * step(f.x, 0.6);
        } else if (rand_char < 0.5) {
          // 가로 구분선
          return step(0.4, f.y) * step(f.y, 0.6);
        } else if (rand_char < 0.75) {
          // 사각형 코드 블록 경계
          let box = step(0.1, f.x) * step(f.x, 0.9) * step(0.1, f.y) * step(f.y, 0.9);
          let inner = step(0.3, f.x) * step(f.x, 0.7) * step(0.3, f.y) * step(f.y, 0.7);
          return clamp(box - inner, 0.0, 1.0);
        } else {
          // 크로스헤어 / 인터섹션 기호
          let c1 = step(0.4, f.x) * step(f.x, 0.6);
          let c2 = step(0.4, f.y) * step(f.y, 0.6);
          return clamp(c1 + c2, 0.0, 1.0);
        }
      }

      @compute @workgroup_size(16, 16)
      fn cs_main(@builtin(global_invocation_id) id: vec3u) {
        let size = textureDimensions(out_tex);
        if (id.x >= size.x || id.y >= size.y) { return; }

        let uv = vec2f(id.xy) / vec2f(size);
        
        // 1. DX11 Texture2D SRV와 유사하게 원본 Colosseum 소스 이미지 샘플링
        let img_color = textureSampleLevel(src_tex, src_sampler, uv, 0.0);

        // 2. 절차적 매트릭스 스타일 소스 코드 생성
        let aspect = vec2f(f32(size.x) / f32(size.y), 1.0);
        let grid_size = vec2f(params.text_scale * aspect.x, params.text_scale);
        let cell_coords = uv * grid_size;
        let cell_idx = floor(cell_coords);
        let local_coords = fract(cell_coords);

        // 컬럼마다 무작위 떨어지는 속도 부여
        let rand_stream = hash2(vec2f(cell_idx.x, 57.12));
        let speed = rand_stream * 4.0 + 1.0;
        let time_offset = params.time * speed;
        
        // 폭포수 효과 (Falloff)
        let head = fract(-cell_idx.y / grid_size.y + time_offset);
        let brightness = pow(head, 4.0) * 1.5; 
        
        // 각 셀마다 무작위 타이밍으로 글자 바꿈
        let rand_char = hash2(cell_idx + floor(time_offset * 3.0));
        let char_bright = get_char_brightness(local_coords, rand_char) * brightness;

        // 최종 디지털 소스 코드 색상
        let code_color = vec4f(
          char_bright * params.color_r,
          char_bright * params.color_g,
          char_bright * params.color_b,
          1.0
        );

        // 3. DX11 Blending 연산 모방 (Add / Blend 연산)
        let final_color = img_color * params.image_intensity + code_color * params.code_intensity;

        // 4. DX11 RWTexture2D (UAV)와 동일하게 Storage Texture에 쓰기
        textureStore(out_tex, id.xy, clamp(final_color, vec4f(0.0), vec4f(1.0)));
      }
    `;

    const RENDER_SHADER_SRC = `
      struct VSOutput {
        @builtin(position) position: vec4f,
        @location(0) uv: vec2f,
      }

      @vertex
      fn vs_main(@builtin(vertex_index) idx: u32) -> VSOutput {
        // Fullscreen Quad (6 Vertex)
        var pos = array<vec2f, 6>(
          vec2f(-1.0, -1.0), vec2f(1.0, -1.0), vec2f(-1.0, 1.0),
          vec2f(-1.0, 1.0), vec2f(1.0, -1.0), vec2f(1.0, 1.0)
        );
        var uv = array<vec2f, 6>(
          vec2f(0.0, 1.0), vec2f(1.0, 1.0), vec2f(0.0, 0.0),
          vec2f(0.0, 0.0), vec2f(1.0, 1.0), vec2f(1.0, 0.0)
        );
        var out: VSOutput;
        out.position = vec4f(pos[idx], 0.0, 1.0);
        out.uv = uv[idx];
        return out;
      }

      @group(0) @binding(0) var t_output: texture_2d<f32>;
      @group(0) @binding(1) var s_sampler: sampler;

      @fragment
      fn fs_main(@location(0) uv: vec2f) -> @location(0) vec4f {
        return textureSample(t_output, s_sampler, uv);
      }
    `;

    // -------------------------------------------------------------------------
    // 2. 메인 애플리케이션 및 WebGPU 파이프라인 구축
    // -------------------------------------------------------------------------

    const canvas = document.getElementById('gpu-canvas');
    const errOverlay = document.getElementById('error-overlay');
    const W = 800;
    const H = 600;

    // UI 요소 연동
    const animEnable = document.getElementById('anim-enable');
    const sliderImg = document.getElementById('slider-img');
    const sliderCode = document.getElementById('slider-code');
    const sliderScale = document.getElementById('slider-scale');
    const sliderSpeed = document.getElementById('slider-speed');
    const pickerColor = document.getElementById('picker-color');

    const valImg = document.getElementById('val-img');
    const valCode = document.getElementById('val-code');
    const valScale = document.getElementById('val-scale');
    const valSpeed = document.getElementById('val-speed');
    const fpsDisplay = document.getElementById('fps-display');

    // UI 레이블 실시간 연동
    sliderImg.oninput = () => valImg.textContent = parseFloat(sliderImg.value).toFixed(2);
    sliderCode.oninput = () => valCode.textContent = parseFloat(sliderCode.value).toFixed(2);
    sliderScale.oninput = () => valScale.textContent = parseFloat(sliderScale.value).toFixed(1);
    sliderSpeed.oninput = () => valSpeed.textContent = parseFloat(sliderSpeed.value).toFixed(2);

    // 이미지 로더 구현
    async function loadImage(url, w, h) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = () => reject(new Error(`이미지 로드 실패: ${url}`));
        img.src = url;
      });
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      return c;
    }

    async function initWebGPU() {
      if (!navigator.gpu) {
        throw new Error("WebGPU가 지원되지 않는 브라우저입니다.");
      }

      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) {
        throw new Error("적합한 WebGPU 어댑터를 찾지 못했습니다.");
      }

      const device = await adapter.requestDevice();
      const context = canvas.getContext('webgpu');
      const format = navigator.gpu.getPreferredCanvasFormat();

      context.configure({
        device: device,
        format: format,
        alphaMode: 'opaque'
      });

      // 1. 소스 이미지 로드 및 GPU 리소스 바인딩
      let srcCanvas;
      try {
        srcCanvas = await loadImage('../../images/colosseum.jpg', W, H);
      } catch (err) {
        console.warn("로컬 이미지를 찾을 수 없어 절차적 백업 텍스처를 생성합니다.");
        srcCanvas = document.createElement('canvas');
        srcCanvas.width = W; srcCanvas.height = H;
        const ctx = srcCanvas.getContext('2d');
        // 아름다운 그리드 패턴 생성
        ctx.fillStyle = "#1e1e2f";
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = "#4fc1ff";
        ctx.lineWidth = 2;
        for(let i=0; i<W; i+=40) {
          ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
        }
        for(let j=0; j<H; j+=40) {
          ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(W, j); ctx.stroke();
        }
      }

      const srcData = srcCanvas.getContext('2d').getImageData(0, 0, W, H).data;

      const srcTexture = device.createTexture({
        size: [W, H, 1],
        format: 'rgba8unorm',
        usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST
      });

      device.queue.writeTexture(
        { texture: srcTexture },
        srcData,
        { bytesPerRow: W * 4 },
        [W, H, 1]
      );

      // 2. Storage Texture 생성 (DX11 UAV 역할)
      const storageTexture = device.createTexture({
        size: [W, H, 1],
        format: 'rgba8unorm',
        usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
      });

      // 공용 필터링 샘플러
      const sampler = device.createSampler({
        magFilter: 'linear',
        minFilter: 'linear'
      });

      // 3. Uniform Buffer 구조체 생성 (시간, 강도 조절 파라미터)
      const uniformBuffer = device.createBuffer({
        size: 32, // f32 8개
        usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.UNIFORM
      });

      const paramsArray = new Float32Array(8);

      // 4. Compute Pipeline 생성
      const computeModule = device.createShaderModule({ code: COMPUTE_SHADER_SRC });
      const computeBindGroupLayout = device.createBindGroupLayout({
        entries: [
          { binding: 0, visibility: GPUShaderStage.COMPUTE, texture: { sampleType: 'float' } },
          { binding: 1, visibility: GPUShaderStage.COMPUTE, sampler: { type: 'filtering' } },
          { binding: 2, visibility: GPUShaderStage.COMPUTE, storageTexture: { access: 'write-only', format: 'rgba8unorm' } },
          { binding: 3, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } }
        ]
      });

      const computePipeline = device.createComputePipeline({
        layout: device.createPipelineLayout({ bindGroupLayouts: [computeBindGroupLayout] }),
        compute: {
          module: computeModule,
          entryPoint: 'cs_main'
        }
      });

      const computeBindGroup = device.createBindGroup({
        layout: computeBindGroupLayout,
        entries: [
          { binding: 0, resource: srcTexture.createView() },
          { binding: 1, resource: sampler },
          { binding: 2, resource: storageTexture.createView() },
          { binding: 3, resource: { buffer: uniformBuffer } }
        ]
      });

      // 5. Render Pipeline 생성
      const renderModule = device.createShaderModule({ code: RENDER_SHADER_SRC });
      const renderBindGroupLayout = device.createBindGroupLayout({
        entries: [
          { binding: 0, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'float' } },
          { binding: 1, visibility: GPUShaderStage.FRAGMENT, sampler: { type: 'filtering' } }
        ]
      });

      const renderPipeline = device.createRenderPipeline({
        layout: device.createPipelineLayout({ bindGroupLayouts: [renderBindGroupLayout] }),
        vertex: {
          module: renderModule,
          entryPoint: 'vs_main'
        },
        fragment: {
          module: renderModule,
          entryPoint: 'fs_main',
          targets: [{ format: format }]
        },
        primitive: { topology: 'triangle-list' }
      });

      const renderBindGroup = device.createBindGroup({
        layout: renderBindGroupLayout,
        entries: [
          { binding: 0, resource: storageTexture.createView() },
          { binding: 1, resource: sampler }
        ]
      });

      // -------------------------------------------------------------------------
      // 3. 렌더 루프 및 애니메이션 갱신 제어
      // -------------------------------------------------------------------------

      let lastTime = performance.now();
      let totalTime = 0.0;
      let frameCount = 0;
      let fpsTimer = 0.0;
      let isRenderScheduled = false;

      function render() {
        isRenderScheduled = false;

        const now = performance.now();
        const dt = (now - lastTime) / 1000.0;
        lastTime = now;

        // FPS 카운팅
        fpsTimer += dt;
        frameCount++;
        if (fpsTimer >= 1.0) {
          fpsDisplay.textContent = `FPS: ${frameCount}`;
          frameCount = 0;
          fpsTimer = 0.0;
        }

        // 시간 누적
        if (animEnable.checked) {
          totalTime += dt * parseFloat(sliderSpeed.value);
        }

        // HEX 색상 분석
        const hex = pickerColor.value;
        const r = parseInt(hex.slice(1, 3), 16) / 255.0;
        const g = parseInt(hex.slice(3, 5), 16) / 255.0;
        const b = parseInt(hex.slice(5, 7), 16) / 255.0;

        // Uniform 파라미터 업데이트
        paramsArray[0] = parseFloat(sliderImg.value);
        paramsArray[1] = parseFloat(sliderCode.value);
        paramsArray[2] = totalTime;
        paramsArray[3] = parseFloat(sliderScale.value);
        paramsArray[4] = r;
        paramsArray[5] = g;
        paramsArray[6] = b;
        paramsArray[7] = 0.0; // padding

        device.queue.writeBuffer(uniformBuffer, 0, paramsArray);

        // Command Buffer 레코딩 및 제출
        const commandEncoder = device.createCommandEncoder();

        // Pass 1: Compute Pass (DX11 Dispatch)
        const computePass = commandEncoder.beginComputePass();
        computePass.setPipeline(computePipeline);
        computePass.setBindGroup(0, computeBindGroup);
        // [numthreads(16,16,1)] 과 맵핑하여 Dispatch 계산
        computePass.dispatchWorkgroups(Math.ceil(W / 16), Math.ceil(H / 16), 1);
        computePass.end();

        // Pass 2: Render Pass (Storage Texture를 캔버스에 Fullscreen Blit)
        const renderPass = commandEncoder.beginRenderPass({
          colorAttachments: [{
            view: context.getCurrentTexture().createView(),
            clearValue: { r: 0.1, g: 0.1, b: 0.18, a: 1.0 },
            loadOp: 'clear',
            storeOp: 'store'
          }]
        });
        renderPass.setPipeline(renderPipeline);
        renderPass.setBindGroup(0, renderBindGroup);
        renderPass.draw(6); // Fullscreen Quad 그리기
        renderPass.end();

        device.queue.submit([commandEncoder.finish()]);

        scheduleRender();
      }

      function scheduleRender() {
        if (!isRenderScheduled) {
          isRenderScheduled = true;
          requestAnimationFrame(render);
        }
      }

      // 슬라이더 조작 시 즉시 렌더 업데이트 스케줄링 (RAF 중복 발생 예방)
      sliderImg.addEventListener('input', scheduleRender);
      sliderCode.addEventListener('input', scheduleRender);
      sliderScale.addEventListener('input', scheduleRender);
      sliderSpeed.addEventListener('input', scheduleRender);
      pickerColor.addEventListener('input', scheduleRender);
      animEnable.addEventListener('change', scheduleRender);

      // 시작 루프 기동
      scheduleRender();
    }

    // 예외 캐치 및 에러 표출
    initWebGPU().catch(err => {
      console.error(err);
      errOverlay.style.display = 'flex';
      errOverlay.textContent = err.message;
    });
  </script>
</body>
</html>
