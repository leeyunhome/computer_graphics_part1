<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU - Animate red pixel moving across canvas frame by frame</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      user-select: none;
    }

    #app-container {
      display: flex;
      flex-direction: column;
      width: 900px;
      height: 650px;
      background-color: #161625;
      border: 1px solid #3f3f5a;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      overflow: hidden;
    }

    /* ImGui Window Title Bar */
    #title-bar {
      background-color: #2d2d44;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #3f3f5a;
      font-weight: bold;
      font-size: 13px;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    #title-bar .dots {
      display: flex;
      gap: 6px;
    }

    #title-bar .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #ff5f56;
    }
    #title-bar .dot.yellow { background-color: #ffbd2e; }
    #title-bar .dot.green { background-color: #27c93f; }

    /* Workspace split */
    #workspace {
      display: flex;
      flex: 1;
      height: calc(100% - 35px);
    }

    /* Canvas Viewport */
    #viewport-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #0f0f1a;
      position: relative;
      border-right: 1px solid #3f3f5a;
    }

    canvas {
      width: 512px;
      height: 512px;
      image-rendering: pixelated;
      background-color: #000;
      border: 2px solid #2d2d44;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }

    /* ImGui Sidebar Panel */
    #gui-panel {
      width: 320px;
      background-color: #1e1e30;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 20px;
      font-size: 13px;
    }

    .gui-group {
      background-color: #252538;
      border: 1px solid #3f3f5a;
      border-radius: 4px;
      padding: 12px;
    }

    .gui-group-title {
      font-size: 12px;
      text-transform: uppercase;
      font-weight: bold;
      color: #4e81cf;
      margin-bottom: 10px;
      border-bottom: 1px solid #3f3f5a;
      padding-bottom: 4px;
    }

    .gui-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .gui-row:last-child {
      margin-bottom: 0;
    }

    label {
      color: #b0b0cf;
    }

    /* ImGui Style Controls */
    input[type="range"] {
      -webkit-appearance: none;
      width: 130px;
      background: #3f3f5a;
      height: 6px;
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4e81cf;
      cursor: pointer;
      transition: background 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #6ca0f0;
    }

    button {
      background-color: #4e81cf;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
      transition: background-color 0.1s;
      width: 100%;
    }

    button:hover {
      background-color: #365e9b;
    }

    button:active {
      background-color: #2c4c80;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-container input {
      cursor: pointer;
    }

    .value-display {
      font-family: monospace;
      background-color: #121220;
      padding: 2px 6px;
      border-radius: 3px;
      color: #00ffcc;
      font-size: 12px;
      min-width: 40px;
      text-align: right;
    }

    #error-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(26, 26, 46, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ff5f56;
      font-weight: bold;
      z-index: 100;
      text-align: center;
      padding: 20px;
    }
    
    #error-overlay h2 {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <!-- Window Title Bar -->
    <div id="title-bar">
      <span>DirectX 11 — Animate red pixel moving across canvas frame by frame</span>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
    </div>

    <!-- Main Workspace -->
    <div id="workspace">
      <!-- WebGPU Render Target Frame -->
      <div id="viewport-container">
        <canvas id="gpu-canvas"></canvas>
        <div id="error-overlay" style="display: none;">
          <h2>WebGPU 미지원 브라우저</h2>
          <p>이 브라우저는 WebGPU를 지원하지 않습니다. Chrome, Edge, Safari 최신 버전을 사용해주세요.</p>
        </div>
      </div>

      <!-- ImGui Control Panel -->
      <div id="gui-panel">
        <div class="gui-group">
          <div class="gui-group-title">애니메이션 제어</div>
          <div class="gui-row">
            <label>자동 재생</label>
            <label class="checkbox-container">
              <input type="checkbox" id="play-pause" checked>
              <span id="play-status" style="color:#00ffcc;">재생 중</span>
            </label>
          </div>
          <div class="gui-row">
            <label>애니메이션 속도</label>
            <div style="display: flex; align-items: center; gap: 8px;">
              <input type="range" id="speed-slider" min="1" max="60" value="30">
              <span class="value-display" id="speed-val">30 fps</span>
            </div>
          </div>
        </div>

        <div class="gui-group">
          <div class="gui-group-title">수동 픽셀 위치</div>
          <div class="gui-row">
            <label>픽셀 인덱스</label>
            <div style="display: flex; align-items: center; gap: 8px;">
              <input type="range" id="index-slider" min="0" max="16383" value="0" disabled>
              <span class="value-display" id="index-val">0</span>
            </div>
          </div>
          <button id="reset-btn">애니메이션 초기화</button>
        </div>

        <div class="gui-group">
          <div class="gui-group-title">픽셀 통계 정보 (DirectX 11)</div>
          <div class="gui-row">
            <label>캔버스 해상도</label>
            <span class="value-display" style="color: #ffffff;">128 x 128</span>
          </div>
          <div class="gui-row">
            <label>전체 픽셀 수</label>
            <span class="value-display" style="color: #ffffff;">16,384</span>
          </div>
          <div class="gui-row">
            <label>현재 픽셀 X</label>
            <span class="value-display" id="pos-x">0</span>
          </div>
          <div class="gui-row">
            <label>현재 픽셀 Y</label>
            <span class="value-display" id="pos-y">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // --- WGSL Shaders ---

    // Compute Shader
    const computeShaderWGSL = `
      struct Params {
        width: u32,
        height: u32,
        index: u32,
        padding: u32,
      }

      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var outTex: texture_storage_2d<rgba8unorm, write>;

      @compute @workgroup_size(8, 8)
      fn main(@builtin(global_invocation_id) id: vec3u) {
        let w = params.width;
        let h = params.height;

        if (id.x >= w || id.y >= h) {
          return;
        }

        let currentIndex = params.index;
        let pixelIndex = id.y * w + id.x;

        // Base background color: Light Gray {0.8, 0.8, 0.8, 1.0}
        var color = vec4f(0.8, 0.8, 0.8, 1.0);

        // If index matches, paint it RED {1.0, 0.0, 0.0, 1.0}
        if (pixelIndex == currentIndex) {
          color = vec4f(1.0, 0.0, 0.0, 1.0);
        }

        textureStore(outTex, vec2i(id.xy), color);
      }
    `;

    // Render Shader (Fullscreen Quad Texture Map)
    const renderShaderWGSL = `
      struct VSOutput {
        @builtin(position) pos: vec4f,
        @location(0) uv: vec2f,
      }

      @vertex
      fn vs_main(@builtin(vertex_index) idx: u32) -> VSOutput {
        var pos = array<vec2f, 6>(
          vec2f(-1.0, -1.0), vec2f(1.0, -1.0), vec2f(-1.0, 1.0),
          vec2f(-1.0, 1.0), vec2f(1.0, -1.0), vec2f(1.0, 1.0)
        );
        var uv = array<vec2f, 6>(
          vec2f(0.0, 1.0), vec2f(1.0, 1.0), vec2f(0.0, 0.0),
          vec2f(0.0, 0.0), vec2f(1.0, 1.0), vec2f(1.0, 0.0)
        );
        var out: VSOutput;
        out.pos = vec4f(pos[idx], 0.0, 1.0);
        out.uv = uv[idx];
        return out;
      }

      @group(0) @binding(0) var t: texture_2d<f32>;
      @group(0) @binding(1) var s: sampler;

      @fragment
      fn fs_main(@location(0) uv: vec2f) -> @location(0) vec4f {
        return textureSample(t, s, uv);
      }
    `;

    // --- WebGPU Implementation ---

    const canvas = document.getElementById('gpu-canvas');
    const width = 128;
    const height = 128;
    canvas.width = width;
    canvas.height = height;

    // UI elements
    const playCheckbox = document.getElementById('play-pause');
    const playStatus = document.getElementById('play-status');
    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');
    const indexSlider = document.getElementById('index-slider');
    const indexVal = document.getElementById('index-val');
    const resetBtn = document.getElementById('reset-btn');
    const posXDisplay = document.getElementById('pos-x');
    const posYDisplay = document.getElementById('pos-y');
    const errorOverlay = document.getElementById('error-overlay');

    let device, context;
    let computePipeline, renderPipeline;
    let uniformBuffer, storageTexture, renderBindGroup, computeBindGroup, sampler;
    
    let currentIndex = 0;
    const maxIndex = width * height - 1;
    let isPlaying = true;
    let targetFps = 30;
    let lastFrameTime = 0;

    async function initWebGPU() {
      if (!navigator.gpu) {
        errorOverlay.style.display = 'flex';
        return false;
      }

      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) {
        errorOverlay.style.display = 'flex';
        return false;
      }

      device = await adapter.requestDevice();
      context = canvas.getContext('webgpu');

      const format = navigator.gpu.getPreferredCanvasFormat();
      context.configure({
        device,
        format,
        alphaMode: 'opaque'
      });

      // 1. Uniform Buffer (width, height, index, padding)
      uniformBuffer = device.createBuffer({
        size: 16, // 4 * 4 bytes
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
      });

      // 2. Storage Texture Creation (Compute destination, Render source)
      storageTexture = device.createTexture({
        size: [width, height],
        format: 'rgba8unorm',
        usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
      });

      sampler = device.createSampler({
        magFilter: 'nearest',
        minFilter: 'nearest'
      });

      // 3. Compute Pipeline
      const computeModule = device.createShaderModule({ code: computeShaderWGSL });
      computePipeline = device.createComputePipeline({
        layout: 'auto',
        compute: {
          module: computeModule,
          entryPoint: 'main'
        }
      });

      // 4. Render Pipeline (Draw Fullscreen Quad)
      const renderModule = device.createShaderModule({ code: renderShaderWGSL });
      renderPipeline = device.createRenderPipeline({
        layout: 'auto',
        vertex: {
          module: renderModule,
          entryPoint: 'vs_main'
        },
        fragment: {
          module: renderModule,
          entryPoint: 'fs_main',
          targets: [{ format }]
        }
      });

      // 5. Bind Groups
      computeBindGroup = device.createBindGroup({
        layout: computePipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: storageTexture.createView() }
        ]
      });

      renderBindGroup = device.createBindGroup({
        layout: renderPipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: storageTexture.createView() },
          { binding: 1, resource: sampler }
        ]
      });

      return true;
    }

    // Write parameters to Uniform Buffer
    function updateUniformBuffer() {
      const arrayBuffer = new ArrayBuffer(16);
      const uints = new Uint32Array(arrayBuffer);
      uints[0] = width;
      uints[1] = height;
      uints[2] = currentIndex;
      uints[3] = 0; // padding

      device.queue.writeBuffer(uniformBuffer, 0, arrayBuffer);
    }

    // Main frame function
    function executePasses() {
      // 1. Update uniform data
      updateUniformBuffer();

      // Command Encoder
      const commandEncoder = device.createCommandEncoder();

      // 2. Compute Pass
      const computePass = commandEncoder.beginComputePass();
      computePass.setPipeline(computePipeline);
      computePass.setBindGroup(0, computeBindGroup);
      const workgroupX = Math.ceil(width / 8);
      const workgroupY = Math.ceil(height / 8);
      computePass.dispatchWorkgroups(workgroupX, workgroupY);
      computePass.end();

      // 3. Render Pass
      const renderPass = commandEncoder.beginRenderPass({
        colorAttachments: [{
          view: context.getCurrentTexture().createView(),
          clearValue: { r: 0.1, g: 0.1, b: 0.18, a: 1.0 },
          loadOp: 'clear',
          storeOp: 'store'
        }]
      });
      renderPass.setPipeline(renderPipeline);
      renderPass.setBindGroup(0, renderBindGroup);
      renderPass.draw(6); // 6 vertices for 2 triangles
      renderPass.end();

      // Submit commands
      device.queue.submit([commandEncoder.finish()]);
    }

    // Schedule Rendering (Avoid duplicate RAF)
    let renderScheduled = false;
    function scheduleRender() {
      if (renderScheduled) return;
      renderScheduled = true;
      requestAnimationFrame((timestamp) => {
        renderScheduled = false;
        
        if (isPlaying) {
          const elapsed = timestamp - lastFrameTime;
          const frameInterval = 1000 / targetFps;

          if (elapsed >= frameInterval) {
            // Step index frame by frame
            currentIndex = (currentIndex + 1) % (width * height);
            lastFrameTime = timestamp - (elapsed % frameInterval);
            
            // Sync slider UI
            indexSlider.value = currentIndex;
            updateStatusText();
          }
        }

        executePasses();
        
        // Loop continuously
        scheduleRender();
      });
    }

    // Update coordinates and text in UI
    function updateStatusText() {
      indexVal.textContent = currentIndex;
      
      const px = currentIndex % width;
      const py = Math.floor(currentIndex / width);
      
      posXDisplay.textContent = px;
      posYDisplay.textContent = py;
    }

    // --- UI Interaction Handlers ---

    playCheckbox.addEventListener('change', (e) => {
      isPlaying = e.target.checked;
      if (isPlaying) {
        playStatus.textContent = "재생 중";
        playStatus.style.color = "#00ffcc";
        indexSlider.disabled = true;
      } else {
        playStatus.textContent = "일시정지";
        playStatus.style.color = "#ff5f56";
        indexSlider.disabled = false;
      }
    });

    speedSlider.addEventListener('input', (e) => {
      targetFps = parseInt(e.target.value);
      speedVal.textContent = `${targetFps} fps`;
    });

    indexSlider.addEventListener('input', (e) => {
      if (!isPlaying) {
        currentIndex = parseInt(e.target.value);
        updateStatusText();
        executePasses();
      }
    });

    resetBtn.addEventListener('click', () => {
      currentIndex = 0;
      indexSlider.value = 0;
      updateStatusText();
      if (!isPlaying) {
        executePasses();
      }
    });

    // Start App
    initWebGPU().then((success) => {
      if (success) {
        updateStatusText();
        lastFrameTime = performance.now();
        scheduleRender();
      }
    });

  </script>
</body>
</html>
