<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>픽셀 버퍼 애니메이션 (WebGPU)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f172a; color:#e2e8f0; font-family:'Segoe UI',sans-serif;
         display:flex; flex-direction:column; align-items:center; padding:20px; min-height:100vh; }
  h2 { color:#a78bfa; margin-bottom:6px; font-size:1.05rem; }
  .tags { margin-bottom:12px; }
  .tag { display:inline-block; background:#1e1b4b; color:#a5b4fc; font-size:0.65rem;
         padding:2px 7px; border-radius:4px; margin:2px; }
  canvas { border:1px solid #4c1d95; display:block; }
  .controls { display:flex; flex-wrap:wrap; gap:12px; margin-top:14px; justify-content:center; }
  .ctrl { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:0.72rem; color:#c4b5fd; }
  input[type=range] { width:120px; accent-color:#7c3aed; }
  .val { font-size:0.68rem; color:#a78bfa; font-family:monospace; }
  #msg { font-size:0.72rem; margin-top:8px; color:#64748b; }
  #err { color:#fca5a5; background:#450a0a; border:1px solid #7f1d1d; border-radius:6px;
         padding:12px 16px; margin-top:12px; font-size:0.8rem; display:none; max-width:420px; text-align:center; }
</style>
</head>
<body>
<h2>픽셀 버퍼 애니메이션</h2>
<div class="tags">
  <span class="tag">WebGPU Compute Shader</span>
  <span class="tag">WGSL ≈ HLSL</span>
  <span class="tag">GPU 병렬 픽셀 계산</span>
</div>
<canvas id="c" width="400" height="300"></canvas>
<div id="err"></div>
<div id="msg">초기화 중...</div>

<div class="controls">
  <div class="ctrl">
    <span>속도</span>
    <input type="range" id="speed" min="0.5" max="15" step="0.5" value="3">
    <span class="val" id="speedV">3.0</span>
  </div>
  <div class="ctrl">
    <span>R 주기</span>
    <input type="range" id="rp" min="50" max="500" step="10" value="200">
    <span class="val" id="rpV">200</span>
  </div>
  <div class="ctrl">
    <span>G 주기</span>
    <input type="range" id="gp" min="50" max="500" step="10" value="300">
    <span class="val" id="gpV">300</span>
  </div>
  <div class="ctrl">
    <span>B 주기</span>
    <input type="range" id="bp" min="50" max="500" step="10" value="400">
    <span class="val" id="bpV">400</span>
  </div>
</div>

<script>
const W = 400, H = 300;
let speed = 3, rP = 200, gP = 300, bP = 400, t = 0;

function bind(id, cb) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    cb(parseFloat(el.value));
    document.getElementById(id + 'V').textContent = el.value;
  });
}
bind('speed', v => speed = v);
bind('rp',    v => rP   = v);
bind('gp',    v => gP   = v);
bind('bp',    v => bP   = v);

async function main() {
  if (!navigator.gpu) throw new Error('WebGPU 미지원 — Chrome 113+ 또는 Edge 113+가 필요합니다.');
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) throw new Error('GPU 어댑터를 찾을 수 없습니다.');
  const device = await adapter.requestDevice();

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('webgpu');
  const fmt = navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({ device, format: fmt, alphaMode: 'opaque' });

  // Storage Texture — DX11: RWTexture2D<float4> (UAV)
  const storageTex = device.createTexture({
    size: [W, H],
    format: 'rgba8unorm',
    usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
  });

  // Uniform Buffer — DX11: cbuffer (16-byte aligned, float x4)
  const uniformBuf = device.createBuffer({
    size: 16,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  // WGSL Compute Shader
  // DX11 HLSL 대응: [numthreads(8,8,1)] → @workgroup_size(8,8)
  //                 SV_DispatchThreadID → @builtin(global_invocation_id)
  //                 RWTexture2D        → texture_storage_2d<rgba8unorm, write>
  const computeShader = device.createShaderModule({ code: `
    struct Params {
      time     : f32,
      r_period : f32,
      g_period : f32,
      b_period : f32,
    }

    @group(0) @binding(0) var output_tex : texture_storage_2d<rgba8unorm, write>;
    @group(0) @binding(1) var<uniform>   p : Params;

    @compute @workgroup_size(8, 8)
    fn cs_main(@builtin(global_invocation_id) id : vec3u) {
      let dims = textureDimensions(output_tex);
      if id.x >= dims.x || id.y >= dims.y { return; }

      let sum = f32(id.x + id.y) + p.time;
      let r = fract(sum / p.r_period);
      let g = fract(sum / p.g_period);
      let b = fract(sum / p.b_period);

      textureStore(output_tex, vec2i(id.xy), vec4f(r, g, b, 1.0));
    }
  `});

  const computePipeline = device.createComputePipeline({
    layout: 'auto',
    compute: { module: computeShader, entryPoint: 'cs_main' },
  });

  // Render Pipeline — Compute 결과 텍스처를 fullscreen quad로 표시
  const renderShader = device.createShaderModule({ code: `
    @vertex
    fn vs(@builtin(vertex_index) vi : u32) -> @builtin(position) vec4f {
      var pos = array<vec2f, 6>(
        vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1),
        vec2f(-1, 1), vec2f(1,-1), vec2f( 1,1),
      );
      return vec4f(pos[vi], 0.0, 1.0);
    }
    @group(0) @binding(0) var tex  : texture_2d<f32>;
    @group(0) @binding(1) var samp : sampler;
    @fragment
    fn fs(@builtin(position) pos : vec4f) -> @location(0) vec4f {
      return textureSample(tex, samp, pos.xy / vec2f(${W}.0, ${H}.0));
    }
  `});

  const renderPipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex:   { module: renderShader, entryPoint: 'vs' },
    fragment: { module: renderShader, entryPoint: 'fs', targets: [{ format: fmt }] },
    primitive: { topology: 'triangle-list' },
  });

  const sampler = device.createSampler({ magFilter: 'nearest', minFilter: 'nearest' });

  const computeBG = device.createBindGroup({
    layout: computePipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: storageTex.createView() },
      { binding: 1, resource: { buffer: uniformBuf } },
    ],
  });
  const renderBG = device.createBindGroup({
    layout: renderPipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: storageTex.createView() },
      { binding: 1, resource: sampler },
    ],
  });

  const msgEl = document.getElementById('msg');
  let frameCount = 0, lastTime = performance.now();

  function frame() {
    // Uniform 업데이트 — DX11: UpdateSubresource
    device.queue.writeBuffer(uniformBuf, 0, new Float32Array([t, rP, gP, bP]));

    const encoder = device.createCommandEncoder();

    // Compute Pass — DX11: CSSetShader → Dispatch
    const cp = encoder.beginComputePass();
    cp.setPipeline(computePipeline);
    cp.setBindGroup(0, computeBG);
    cp.dispatchWorkgroups(Math.ceil(W / 8), Math.ceil(H / 8));
    cp.end();

    // Render Pass — DX11: Draw → Present
    const rp = encoder.beginRenderPass({
      colorAttachments: [{
        view: ctx.getCurrentTexture().createView(),
        clearValue: [0,0,0,1], loadOp: 'clear', storeOp: 'store',
      }],
    });
    rp.setPipeline(renderPipeline);
    rp.setBindGroup(0, renderBG);
    rp.draw(6);
    rp.end();

    device.queue.submit([encoder.finish()]);

    t += speed;
    frameCount++;
    const now = performance.now();
    if (now - lastTime >= 1000) {
      msgEl.textContent = `WebGPU Compute  |  ${frameCount} FPS  |  ${W}×${H} = ${(W*H/1000).toFixed(0)}k 픽셀 GPU 병렬 처리`;
      frameCount = 0; lastTime = now;
    }
    requestAnimationFrame(frame);
  }
  frame();
}

main().catch(err => {
  document.getElementById('c').style.display = 'none';
  const el = document.getElementById('err');
  el.style.display = 'block';
  el.innerHTML = `<strong>WebGPU 초기화 실패</strong><br>${err.message}<br><br>
    Chrome 113+ / Edge 113+ 브라우저에서 실행해주세요.`;
  document.getElementById('msg').textContent = '';
});
</script>
</body>
</html>
