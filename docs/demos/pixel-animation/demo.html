<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>픽셀 버퍼 애니메이션 데모</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
  h2 { margin-bottom: 8px; color: #a78bfa; font-size: 1.1rem; }
  p.desc { font-size: 0.8rem; color: #9ca3af; margin-bottom: 16px; text-align: center; }
  canvas { border: 1px solid #4c1d95; display: block; }
  .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; justify-content: center; }
  .ctrl { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.75rem; color: #c4b5fd; }
  input[type=range] { width: 140px; accent-color: #7c3aed; }
  .val { font-size: 0.7rem; color: #a78bfa; }
  .formula { margin-top: 14px; background: #16213e; padding: 10px 16px; border-radius: 6px; font-size: 0.75rem; color: #86efac; font-family: monospace; }
</style>
</head>
<body>
<h2>픽셀 버퍼 애니메이션</h2>
<p class="desc">C++ / DirectX 11에서 구현한 픽셀 단위 색상 제어를 JavaScript Canvas로 재현</p>
<canvas id="c" width="400" height="300"></canvas>

<div class="controls">
  <div class="ctrl">
    <span>속도 (speed)</span>
    <input type="range" id="speed" min="0.5" max="10" step="0.1" value="2">
    <span class="val" id="speedVal">2.0</span>
  </div>
  <div class="ctrl">
    <span>R 주기</span>
    <input type="range" id="rperiod" min="50" max="500" step="10" value="200">
    <span class="val" id="rperiodVal">200</span>
  </div>
  <div class="ctrl">
    <span>G 주기</span>
    <input type="range" id="gperiod" min="50" max="500" step="10" value="300">
    <span class="val" id="gperiodVal">300</span>
  </div>
  <div class="ctrl">
    <span>B 주기</span>
    <input type="range" id="bperiod" min="50" max="500" step="10" value="400">
    <span class="val" id="bperiodVal">400</span>
  </div>
</div>

<div class="formula">
  R = ((x + y + t) % rPeriod) / rPeriod × 255<br>
  G = ((x + y + t) % gPeriod) / gPeriod × 255<br>
  B = ((x + y + t) % bPeriod) / bPeriod × 255
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const imgData = ctx.createImageData(W, H);
const data = imgData.data;

let t = 0;
let speed = 2, rP = 200, gP = 300, bP = 400;

function bindSlider(id, valId, cb) {
  const el = document.getElementById(id);
  const vEl = document.getElementById(valId);
  el.addEventListener('input', () => { cb(parseFloat(el.value)); vEl.textContent = el.value; });
}

bindSlider('speed',   'speedVal',   v => speed = v);
bindSlider('rperiod', 'rperiodVal', v => rP = v);
bindSlider('gperiod', 'gperiodVal', v => gP = v);
bindSlider('bperiod', 'bperiodVal', v => bP = v);

function render() {
  const ti = Math.floor(t);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      const sum = x + y + ti;
      data[idx]     = ((sum % rP) / rP * 255) | 0;
      data[idx + 1] = ((sum % gP) / gP * 255) | 0;
      data[idx + 2] = ((sum % bP) / bP * 255) | 0;
      data[idx + 3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
  t += speed;
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
