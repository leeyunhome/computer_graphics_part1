<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>이미지 밝기 조절 시각화</title>
    <style>
        /* 기본 레이아웃 및 테마 설정 */
        body {
            background-color: #0f172a; /* 어두운 배경 */
            color: #e2e8f0; /* 밝은 텍스트 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* 뷰포트 전체 높이 사용 */
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 제목 스타일 */
        h1 {
            color: #f8fafc; /* 더 밝은 텍스트 */
            margin-bottom: 30px;
            font-size: 2.2em;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* 캔버스 스타일 */
        canvas {
            border: 2px solid #334155; /* 캔버스 테두리 */
            background-color: #000; /* 캔버스 배경 (이미지 로딩 전 또는 투명 부분) */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); /* 그림자 효과 */
            max-width: 90%; /* 화면 너비 제한 */
            height: auto;
            display: block; /* 중앙 정렬을 위해 블록 요소로 */
            border-radius: 8px; /* 부드러운 모서리 */
        }

        /* 컨트롤 패널 스타일 */
        .controls {
            margin-top: 30px;
            padding: 20px 30px;
            background-color: #1e293b; /* 컨트롤 패널 배경 */
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 15px; /* 요소 간 간격 */
        }

        /* 레이블 스타일 */
        label {
            font-size: 1.1em;
            font-weight: 500;
            color: #cbd5e1;
        }

        /* 슬라이더(range input) 스타일 */
        input[type="range"] {
            -webkit-appearance: none; /* 기본 웹킷 스타일 제거 */
            width: 300px;
            height: 8px;
            background: #475569; /* 슬라이더 트랙 색상 */
            outline: none;
            opacity: 0.9;
            transition: opacity .2s;
            border-radius: 5px;
        }
        input[type="range"]:hover {
            opacity: 1; /* 호버 시 투명도 증가 */
        }

        /* 슬라이더 썸(thumb) 스타일 (웹킷 기반 브라우저) */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #60a5fa; /* 썸 색상 */
            cursor: pointer;
            border-radius: 50%; /* 원형 썸 */
            border: 2px solid #e0f2fe; /* 썸 테두리 */
            box-shadow: 0 0 8px rgba(96, 165, 250, 0.6); /* 썸 그림자 */
        }

        /* 슬라이더 썸(thumb) 스타일 (파이어폭스) */
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #60a5fa;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid #e0f2fe;
            box-shadow: 0 0 8px rgba(96, 165, 250, 0.6);
        }

        /* 현재 밝기 값 표시 스타일 */
        #brightnessValue {
            min-width: 40px; /* 값 표시 영역 최소 너비 */
            text-align: right;
            font-weight: bold;
            color: #60a5fa; /* 값 텍스트 색상 */
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <h1>이미지 밝기 조절 시각화</h1>
    <canvas id="mainCanvas"></canvas>
    <div class="controls">
        <label for="brightnessSlider">밝기 조절:</label>
        <!-- 밝기 조절 슬라이더: -100 (어둡게) 에서 100 (밝게) 까지 조절 가능 -->
        <input type="range" id="brightnessSlider" min="-100" max="100" value="0">
        <span id="brightnessValue">0</span> <!-- 현재 밝기 값을 표시할 요소 -->
    </div>

    <script>
        // DOM 요소 가져오기
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const brightnessSlider = document.getElementById('brightnessSlider');
        const brightnessValueSpan = document.getElementById('brightnessValue');

        // 캔버스 크기 설정
        const CANVAS_WIDTH = 600;
        const CANVAS_HEIGHT = 400;

        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        let originalImageData; // 원본 이미지 데이터를 저장할 변수

        /**
         * 초기 이미지 (그라디언트 패턴)를 캔버스에 그립니다.
         * 이 함수는 원본 이미지 데이터를 생성하고 저장합니다.
         */
        function drawInitialImage() {
            // ImageData 객체를 생성하여 픽셀 데이터를 직접 조작
            const imageData = ctx.createImageData(CANVAS_WIDTH, CANVAS_HEIGHT);
            const data = imageData.data; // 픽셀 배열 (R, G, B, A 순서)

            for (let y = 0; y < CANVAS_HEIGHT; y++) {
                for (let x = 0; x < CANVAS_WIDTH; x++) {
                    const i = (y * CANVAS_WIDTH + x) * 4; // 각 픽셀의 첫 번째 채널(R) 인덱스

                    // 복합적인 그라디언트 패턴 생성
                    // R: 가로 방향으로 0에서 255까지 증가
                    // G: 세로 방향으로 0에서 255까지 증가
                    // B: 사인파를 이용하여 물결무늬 패턴 생성
                    const r = Math.floor(255 * (x / CANVAS_WIDTH));
                    const g = Math.floor(255 * (y / CANVAS_HEIGHT));
                    const b = Math.floor(128 + 127 * Math.sin(x * 0.03 + y * 0.05)); // x와 y에 따라 변하는 사인파

                    data[i] = r;         // Red 채널
                    data[i + 1] = g;     // Green 채널
                    data[i + 2] = b;     // Blue 채널
                    data[i + 3] = 255;   // Alpha 채널 (완전히 불투명)
                }
            }
            ctx.putImageData(imageData, 0, 0); // 생성된 이미지 데이터를 캔버스에 그리기

            // 현재 캔버스에 그려진 이미지 데이터를 원본으로 저장
            // 이렇게 함으로써 슬라이더 조작 시 항상 원본에서 시작하여 밝기를 조절할 수 있습니다.
            originalImageData = ctx.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        }

        /**
         * 주어진 ImageData에 밝기 조절을 적용하고 캔버스에 그립니다.
         * @param {ImageData} imageData - 수정할 ImageData 객체
         * @param {number} brightnessAmount - 밝기 조절 값 (양수면 밝게, 음수면 어둡게)
         */
        function applyBrightness(imageData, brightnessAmount) {
            const data = imageData.data; // 픽셀 데이터 (Uint8ClampedArray)

            for (let i = 0; i < data.length; i += 4) {
                // 각 R, G, B 채널에 밝기 조절 값을 더하고, 0-255 범위로 클램핑
                // Math.max(0, ...)는 최소값 0을 보장
                // Math.min(255, ...)는 최대값 255를 보장
                // `originalImageData.data`를 사용하여 항상 원본 픽셀 값에서 시작합니다.
                data[i] = Math.max(0, Math.min(255, originalImageData.data[i] + brightnessAmount));           // Red
                data[i + 1] = Math.max(0, Math.min(255, originalImageData.data[i + 1] + brightnessAmount));     // Green
                data[i + 2] = Math.max(0, Math.min(255, originalImageData.data[i + 2] + brightnessAmount));       // Blue
                // Alpha 채널 (data[i+3])은 변경하지 않습니다.
            }
            ctx.putImageData(imageData, 0, 0); // 수정된 이미지 데이터를 캔버스에 다시 그리기
        }

        /**
         * 슬라이더 값 변경에 따라 시각화를 업데이트하는 함수입니다.
         */
        function updateVisualization() {
            const brightness = parseInt(brightnessSlider.value, 10); // 슬라이더에서 현재 밝기 값 가져오기
            brightnessValueSpan.textContent = brightness; // 현재 값 표시 업데이트

            // 원본 이미지 데이터의 복사본을 생성하여 수정합니다.
            // 이렇게 해야 원본 데이터는 보존되고, 변경 사항은 복사본에만 적용됩니다.
            const currentImageData = new ImageData(
                new Uint8ClampedArray(originalImageData.data), // 원본 데이터의 새로운 Uint8ClampedArray 생성
                originalImageData.width,
                originalImageData.height
            );

            applyBrightness(currentImageData, brightness); // 밝기 조절 적용
        }

        // 초기화:
        drawInitialImage(); // 초기 이미지 그리기
        brightnessSlider.addEventListener('input', updateVisualization); // 슬라이더 값 변경 시 이벤트 리스너 등록

        // 페이지 로드 후 초기 시각화 업데이트 (초기 슬라이더 값 0 반영)
        updateVisualization();
    </script>
</body>
</html>
