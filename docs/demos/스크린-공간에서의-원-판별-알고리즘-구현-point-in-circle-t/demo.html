<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirectX 11 — Raytracing Step 2: Circle in Screen Space</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: rgba(30, 30, 46, 0.95);
            --panel-border: #4f4f70;
            --text-color: #f0f0f5;
            --accent-color: #e94560;
            --accent-hover: #ff6b8b;
            --input-bg: #16213e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ImGui Style Control Panel */
        .imgui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
            font-size: 13px;
            user-select: none;
        }

        .imgui-header {
            background: #0f3460;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--panel-border);
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .imgui-content {
            padding: 12px;
        }

        .imgui-group {
            margin-bottom: 12px;
        }

        .imgui-group:last-child {
            margin-bottom: 0;
        }

        .imgui-label {
            display: block;
            margin-bottom: 4px;
            color: #a0a0ba;
            font-weight: 500;
        }

        .imgui-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            background: var(--input-bg);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: background 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: var(--accent-hover);
        }

        .imgui-value {
            min-width: 45px;
            text-align: right;
            font-family: monospace;
            background: var(--input-bg);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 24px;
            border-radius: 3px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 1px solid var(--panel-border);
            border-radius: 3px;
        }

        #webgpu-error {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(233, 69, 96, 0.95);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <!-- DirectX 11 Style Window Control Overlay -->
        <div class="imgui-panel" id="guiPanel">
            <div class="imgui-header" id="guiHeader">
                <span>DirectX 11 — Ray-Circle Intersection</span>
                <span style="color: #639a67; font-size: 11px;">● Active</span>
            </div>
            <div class="imgui-content">
                <div class="imgui-group">
                    <label class="imgui-label">반지름 (Radius = Height / 4)</label>
                    <div class="imgui-control">
                        <input type="range" id="radiusSlider" min="10" max="300" step="1">
                        <span class="imgui-value" id="radiusVal">150</span>
                    </div>
                </div>

                <div class="imgui-group">
                    <label class="imgui-label">중심 위치 X (Center.x)</label>
                    <div class="imgui-control">
                        <input type="range" id="centerXSlider" min="0" max="800" step="1">
                        <span class="imgui-value" id="centerXVal">400</span>
                    </div>
                </div>

                <div class="imgui-group">
                    <label class="imgui-label">중심 위치 Y (Center.y)</label>
                    <div class="imgui-control">
                        <input type="range" id="centerYSlider" min="0" max="600" step="1">
                        <span class="imgui-value" id="centerYVal">300</span>
                    </div>
                </div>

                <div class="imgui-group">
                    <label class="imgui-label">원 색상 (Circle Color)</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="circleColor" value="#ff2a5f">
                        <span style="font-family: monospace;" id="colorHex">#FF2A5F</span>
                    </div>
                </div>
            </div>
        </div>

        <canvas id="gpuCanvas" width="800" height="600"></canvas>
    </div>

    <div id="webgpu-error">
        <h2>WebGPU Not Supported</h2>
        <p>죄송합니다. 현재 브라우저가 WebGPU를 지원하지 않거나 활성화되지 않았습니다. Chrome, Edge 등의 최신 버전을 사용해주세요.</p>
    </div>

    <script>
        // GUI 드래그 기능 구현
        const guiPanel = document.getElementById('guiPanel');
        const guiHeader = document.getElementById('guiHeader');
        let isDragging = false;
        let startX, startY, initialX, initialY;

        guiHeader.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            const rect = guiPanel.getBoundingClientRect();
            const containerRect = document.getElementById('canvas-container').getBoundingClientRect();
            initialX = rect.left - containerRect.left;
            initialY = rect.top - containerRect.top;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            let newX = initialX + dx;
            let newY = initialY + dy;

            // 영역 제한
            newX = Math.max(0, Math.min(newX, 800 - guiPanel.offsetWidth));
            newY = Math.max(0, Math.min(newY, 600 - guiPanel.offsetHeight));

            guiPanel.style.left = `${newX}px`;
            guiPanel.style.top = `${newY}px`;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // WebGPU 메인 애플리케이션
        class App {
            constructor() {
                this.canvas = document.getElementById('gpuCanvas');
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                
                // 기본 파라미터 (radius=height/4, center=screen center)
                this.params = {
                    centerX: this.width / 2,
                    centerY: this.height / 2,
                    radius: this.height / 4,
                    color: [1.0, 0.165, 0.373, 1.0] // #ff2a5f
                };

                this.initUI();
            }

            initUI() {
                this.radiusSlider = document.getElementById('radiusSlider');
                this.centerXSlider = document.getElementById('centerXSlider');
                this.centerYSlider = document.getElementById('centerYSlider');
                this.circleColor = document.getElementById('circleColor');

                // 초기 UI 바인딩
                this.radiusSlider.value = this.params.radius;
                this.centerXSlider.value = this.params.centerX;
                this.centerYSlider.value = this.params.centerY;
                
                document.getElementById('radiusVal').innerText = this.params.radius;
                document.getElementById('centerXVal').innerText = this.params.centerX;
                document.getElementById('centerYVal').innerText = this.params.centerY;

                const updateUIAndRender = () => {
                    this.params.radius = parseFloat(this.radiusSlider.value);
                    this.params.centerX = parseFloat(this.centerXSlider.value);
                    this.params.centerY = parseFloat(this.centerYSlider.value);

                    document.getElementById('radiusVal').innerText = this.params.radius;
                    document.getElementById('centerXVal').innerText = this.params.centerX;
                    document.getElementById('centerYVal').innerText = this.params.centerY;

                    // Hex to RGB
                    const hex = this.circleColor.value;
                    document.getElementById('colorHex').innerText = hex.toUpperCase();
                    const r = parseInt(hex.slice(1, 3), 16) / 255;
                    const g = parseInt(hex.slice(3, 5), 16) / 255;
                    const b = parseInt(hex.slice(5, 7), 16) / 255;
                    this.params.color = [r, g, b, 1.0];

                    this.updateUniformBuffer();
                    this.scheduleRender();
                };

                this.radiusSlider.addEventListener('input', updateUIAndRender);
                this.centerXSlider.addEventListener('input', updateUIAndRender);
                this.centerYSlider.addEventListener('input', updateUIAndRender);
                this.circleColor.addEventListener('input', updateUIAndRender);
            }

            async initWebGPU() {
                if (!navigator.gpu) {
                    document.getElementById('webgpu-error').style.display = 'block';
                    throw new Error("WebGPU not supported");
                }

                this.adapter = await navigator.gpu.requestAdapter();
                this.device = await this.adapter.requestDevice();
                this.context = this.canvas.getContext('webgpu');

                const presentationFormat = navigator.gpu.getPreferredCanvasFormat();
                this.context.configure({
                    device: this.device,
                    format: presentationFormat,
                    alphaMode: 'opaque'
                });

                // 1. Uniform Buffer 생성 (화면 중앙 정보 및 원 파라미터 전달)
                // 크기: vec2f(8B) + float32(4B) + float32(4B padding) + vec4f(16B) = 32 Bytes
                this.uniformBufferSize = 32;
                this.uniformBuffer = this.device.createBuffer({
                    size: this.uniformBufferSize,
                    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
                });

                // 2. Storage Texture 생성 (연산 결과 보관용, 화면 크기와 동일)
                this.storageTexture = this.device.createTexture({
                    size: [this.width, this.height, 1],
                    format: 'rgba8unorm',
                    usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
                });

                // 3. WGSL 셰이더 소스 작성
                const computeShaderWGSL = `
                    struct CircleParams {
                        center: vec2f,
                        radius: f32,
                        padding: f32,
                        color: vec4f,
                    };

                    @group(0) @binding(0) var<uniform> params: CircleParams;
                    @group(0) @binding(1) var outTexture: texture_storage_2d<rgba8unorm, write>;

                    // 원의 방정식에 기초한 Inside 테스트
                    fn IsInside(pixel: vec2f) -> bool {
                        let diff = pixel - params.center;
                        let distanceSquared = dot(diff, diff);
                        let radiusSquared = params.radius * params.radius;
                        return distanceSquared <= radiusSquared;
                    }

                    @compute @workgroup_size(16, 16)
                    fn cs_main(@builtin(global_invocation_id) global_id: vec3u) {
                        let size = textureDimensions(outTexture);
                        if (global_id.x >= size.x || global_id.y >= size.y) {
                            return;
                        }

                        // 스크린 스페이스 픽셀 포지션 
                        let pixel_pos = vec2f(f32(global_id.x), f32(global_id.y));

                        // 배경 그라데이션 색상 (DirectX 11 스타일 배경 #1a1a2e 구현)
                        var finalColor = vec4f(0.102, 0.102, 0.180, 1.0); 

                        // 점이 원 내부에 있을 때 원 색상 처리
                        if (IsInside(pixel_pos)) {
                            finalColor = params.color;
                        }

                        textureStore(outTexture, global_id.xy, finalColor);
                    }
                `;

                const renderShaderWGSL = `
                    struct VSOutput {
                        @builtin(position) position: vec4f,
                        @location(0) uv: vec2f,
                    };

                    @vertex
                    fn vs_main(@builtin(vertex_index) vertexIndex: u32) -> VSOutput {
                        var pos = array<vec2f, 4>(
                            vec2f(-1.0,  1.0),
                            vec2f(-1.0, -1.0),
                            vec2f( 1.0,  1.0),
                            vec2f( 1.0, -1.0)
                        );
                        var uv = array<vec2f, 4>(
                            vec2f(0.0, 0.0),
                            vec2f(0.0, 1.0),
                            vec2f(1.0, 0.0),
                            vec2f(1.0, 1.0)
                        );
                        var out: VSOutput;
                        out.position = vec4f(pos[vertexIndex], 0.0, 1.0);
                        out.uv = uv[vertexIndex];
                        return out;
                    }

                    @group(0) @binding(0) var inTexture: texture_2d<f32>;
                    @group(0) @binding(1) var inSampler: sampler;

                    @fragment
                    fn fs_main(@location(0) uv: vec2f) -> @location(0) vec4f {
                        return textureSample(inTexture, inSampler, uv);
                    }
                `;

                // 4. Compute 파이프라인 생성
                this.computeModule = this.device.createShaderModule({ code: computeShaderWGSL });
                this.computePipeline = this.device.createComputePipeline({
                    layout: 'auto',
                    compute: {
                        module: this.computeModule,
                        entryPoint: 'cs_main'
                    }
                });

                // 5. Render 파이프라인 생성 (Storage Texture를 캔버스에 그리기 위함)
                this.renderModule = this.device.createShaderModule({ code: renderShaderWGSL });
                this.renderPipeline = this.device.createRenderPipeline({
                    layout: 'auto',
                    vertex: {
                        module: this.renderModule,
                        entryPoint: 'vs_main'
                    },
                    fragment: {
                        module: this.renderModule,
                        entryPoint: 'fs_main',
                        targets: [{ format: presentationFormat }]
                    },
                    primitive: {
                        topology: 'triangle-strip'
                    }
                });

                // 6. Bind Group 설정
                this.computeBindGroup = this.device.createBindGroup({
                    layout: this.computePipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: this.uniformBuffer } },
                        { binding: 1, resource: this.storageTexture.createView() }
                    ]
                });

                this.sampler = this.device.createSampler({
                    magFilter: 'linear',
                    minFilter: 'linear'
                });

                this.renderBindGroup = this.device.createBindGroup({
                    layout: this.renderPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: this.storageTexture.createView() },
                        { binding: 1, resource: this.sampler }
                    ]
                });

                this.updateUniformBuffer();
                this.scheduleRender();
            }

            updateUniformBuffer() {
                const arrayBuffer = new ArrayBuffer(this.uniformBufferSize);
                const view = new DataView(arrayBuffer);

                // center.x, center.y (vec2f)
                view.setFloat32(0, this.params.centerX, true);
                view.setFloat32(4, this.params.centerY, true);

                // radius (f32)
                view.setFloat32(8, this.params.radius, true);
                
                // padding (f32)
                view.setFloat32(12, 0.0, true);

                // color (vec4f)
                view.setFloat32(16, this.params.color[0], true);
                view.setFloat32(20, this.params.color[1], true);
                view.setFloat32(24, this.params.color[2], true);
                view.setFloat32(28, this.params.color[3], true);

                this.device.queue.writeBuffer(this.uniformBuffer, 0, arrayBuffer);
            }

            scheduleRender() {
                if (this.renderPending) return;
                this.renderPending = true;
                requestAnimationFrame(() => {
                    this.render();
                    this.renderPending = false;
                });
            }

            render() {
                const commandEncoder = this.device.createCommandEncoder();

                // 1) Compute Pass (레이트레이싱을 모방한 픽셀 공간 원 내부 판정)
                const computePass = commandEncoder.beginComputePass();
                computePass.setPipeline(this.computePipeline);
                computePass.setBindGroup(0, this.computeBindGroup);
                const workgroupSizeX = Math.ceil(this.width / 16);
                const workgroupSizeY = Math.ceil(this.height / 16);
                computePass.dispatchWorkgroups(workgroupSizeX, workgroupSizeY);
                computePass.end();

                // 2) Render Pass (저장된 텍스처를 화면에 그리기)
                const renderPass = commandEncoder.beginRenderPass({
                    colorAttachments: [{
                        view: this.context.getCurrentTexture().createView(),
                        clearValue: { r: 0.1, g: 0.1, b: 0.18, a: 1.0 },
                        loadOp: 'clear',
                        storeOp: 'store'
                    }]
                });
                renderPass.setPipeline(this.renderPipeline);
                renderPass.setBindGroup(0, this.renderBindGroup);
                renderPass.draw(4);
                renderPass.end();

                this.device.queue.submit([commandEncoder.finish()]);
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const app = new App();
            try {
                await app.initWebGPU();
            } catch (e) {
                console.error(e);
            }
        });
    </script>
</body>
</html>
