<!DOCTYPE html>
<html>
<head>
    <title>이미지 필터 시각화</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; /* Dark background */
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        canvas {
            border: 2px solid #334155;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
            max-width: 90%;
            height: auto;
        }
        /* dat.gui UI 스타일 오버라이드 */
        .dg.main {
            font-size: 14px;
            background-color: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .dg.main .dg.close-button {
            background-color: #334155;
            border-top: 1px solid #475569;
        }
        .dg.main .dg.close-button:hover {
            background-color: #475569;
        }
        .dg.main .dg.close-button .close-button-svg {
            fill: #94a3b8;
        }
        .dg.main .dg.title {
            background-color: #1e293b;
            color: #94a3b8;
            font-weight: bold;
            padding: 10px 15px;
            font-size: 1.1em;
            text-align: center;
        }
        .dg.main .dg.controller {
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 8px 15px;
        }
        .dg.main .dg.controller.active,
        .dg.main .dg.controller:hover {
            background-color: #334155;
        }
        .dg.main .dg.controller .property-name {
            color: #cbd5e1;
            width: 40%; /* Adjust label width */
            margin-right: 10px;
        }
        .dg.main .dg.controller input[type=text] {
            background-color: #0f172a;
            color: #e2e8f0;
            border: 1px solid #334155;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.9em;
            flex-grow: 1; /* Allow text input to grow */
        }
        .dg.main .dg.controller input[type=text]:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
        }
        .dg.main .dg.controller .slider {
            background-color: #475569;
            height: 8px;
            border-radius: 4px;
        }
        .dg.main .dg.controller .slider-fg {
            background-color: #6366f1;
            border-radius: 4px;
        }
        .dg.main .dg.controller.number {
            display: flex; /* Flexbox for slider layout */
            align-items: center;
        }
        .dg.main .dg.controller.number .slider {
            width: 55%; /* Adjust slider width */
        }
        .dg.main .dg.controller.number input[type=text] {
            width: 40px; /* Fix width for number input */
            text-align: right;
        }
        .dg.main .dg.button {
             background-color: #334155;
             color: #e2e8f0;
             border: 1px solid #475569;
             padding: 8px;
             margin: 5px 15px;
             border-radius: 4px;
             cursor: pointer;
             transition: background-color 0.2s;
        }
        .dg.main .dg.button:hover {
             background-color: #475569;
        }
    </style>
    <!-- dat.gui CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
</head>
