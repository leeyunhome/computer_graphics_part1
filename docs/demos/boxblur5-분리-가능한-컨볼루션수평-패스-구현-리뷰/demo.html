<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>BoxBlur5 수평 패스 (WebGPU Compute)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; color:#e2e8f0; font-family:'Segoe UI',sans-serif;
         display:flex; flex-direction:column; align-items:center; padding:16px; }
  h2 { color:#a78bfa; margin-bottom:4px; font-size:1.05rem; }
  .tags { margin-bottom:12px; }
  .tag { display:inline-block; background:#1e1b4b; color:#a5b4fc; font-size:0.65rem;
         padding:2px 7px; border-radius:4px; margin:2px; }
  .window-frame { background:#2d2d2d; border:2px solid #555; border-radius:4px;
                  overflow:hidden; width:600px; }
  .title-bar { background:#3c3c3c; padding:4px 10px; font-size:0.72rem; color:#ccc;
               display:flex; align-items:center; gap:6px; border-bottom:1px solid #555; }
  .dot { width:10px; height:10px; border-radius:50%; }
  .canvas-row { display:flex; gap:0; }
  canvas { display:block; image-rendering:pixelated; }
  .label-row { display:flex; }
  .label-row span { flex:1; text-align:center; font-size:0.62rem; color:#64748b;
                    background:#1e1e1e; padding:2px 0; border-top:1px solid #444; }
  .imgui-panel { background:#252526; border-top:1px solid #444; padding:10px 12px; }
  .imgui-title { font-size:0.68rem; color:#9cdcfe; margin-bottom:8px; }
  .imgui-row { display:flex; align-items:center; gap:8px; margin:5px 0; font-size:0.7rem; }
  .imgui-label { color:#9cdcfe; width:100px; font-family:monospace; font-size:0.68rem; }
  input[type=range] { flex:1; height:14px; accent-color:#7c3aed; }
  .val { width:30px; font-family:monospace; font-size:0.65rem; text-align:right; }
  #msg { font-size:0.65rem; color:#64748b; margin-top:6px; }
  #err { color:#fca5a5; background:#450a0a; border:1px solid #7f1d1d; border-radius:6px;
         padding:10px; margin-top:10px; font-size:0.75rem; display:none; max-width:560px; text-align:center; }
</style>
</head>
<body>
<h2>BoxBlur5 — 분리 가능한 컨볼루션 (수평 패스)</h2>
<div class="tags">
  <span class="tag">WebGPU Compute</span>
  <span class="tag">WGSL ≈ HLSL</span>
  <span class="tag">5-tap Box Filter</span>
  <span class="tag">Separable Convolution</span>
</div>

<div class="window-frame">
  <div class="title-bar">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#ffbd2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span style="margin-left:4px;">DirectX 11 — BoxBlur5 Horizontal Pass</span>
  </div>
  <div class="canvas-row">
    <canvas id="cIn"  width="300" height="200"></canvas>
    <canvas id="cOut" width="300" height="200"></canvas>
  </div>
  <div class="label-row">
    <span>원본 이미지</span>
    <span>수평 블러 결과</span>
  </div>
  <div class="imgui-panel">
    <div class="imgui-title">BlurParams (cbuffer)</div>
    <div class="imgui-row">
      <span class="imgui-label">radius (1~10)</span>
      <input type="range" id="sR" min="1" max="10" step="1" value="2">
      <span class="val" id="vR">2</span>
    </div>
    <div class="imgui-row">
      <span class="imgui-label">passes (1~8)</span>
      <input type="range" id="sP" min="1" max="8" step="1" value="1">
      <span class="val" id="vP">1</span>
    </div>
  </div>
</div>

<div id="err"></div>
<div id="msg">초기화 중...</div>

<script>
const W = 300, H = 200;
let blurRadius = 2, blurPasses = 1;

// ── UI bindings ──────────────────────────────────────────────────────────────
function bind(id, vid, key) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    if (key === 'r') blurRadius = parseInt(el.value);
    else              blurPasses = parseInt(el.value);
    document.getElementById(vid).textContent = el.value;
    scheduleRender();
  });
}
bind('sR','vR','r');
bind('sP','vP','p');

// ── Load source image ────────────────────────────────────────────────────────
async function loadSourceCanvas(url) {
  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = () => reject(new Error(`이미지 로드 실패: ${url}`));
    img.src = url;
  });
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  c.getContext('2d').drawImage(img, 0, 0, W, H);
  return c;
}

// ── WebGPU main ──────────────────────────────────────────────────────────────
async function main() {
  if (!navigator.gpu) throw new Error('WebGPU 미지원 — Chrome 113+ 또는 Edge 113+가 필요합니다.');
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) throw new Error('GPU 어댑터를 찾을 수 없습니다.');
  const device = await adapter.requestDevice();

  // ── Preview canvases ──────────────────────────────────────────────────────
  const srcCanvas = await loadSourceCanvas('../../images/colosseum.jpg');
  // Draw original to left preview
  const previewIn = document.getElementById('cIn');
  previewIn.getContext('2d').drawImage(srcCanvas, 0, 0);

  // WebGPU context for output canvas
  const outCanvas = document.getElementById('cOut');
  const ctx = outCanvas.getContext('webgpu');
  const fmt = navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({ device, format: fmt, alphaMode: 'opaque' });

  // ── Input texture (source image) ──────────────────────────────────────────
  // copyExternalImageToTexture requires RENDER_ATTACHMENT | COPY_DST
  const inputTex = device.createTexture({
    size: [W, H],
    format: 'rgba8unorm',
    usage: GPUTextureUsage.TEXTURE_BINDING |
           GPUTextureUsage.COPY_DST       |
           GPUTextureUsage.RENDER_ATTACHMENT,
  });
  device.queue.copyExternalImageToTexture(
    { source: srcCanvas, flipY: false },
    { texture: inputTex },
    [W, H],
  );

  // ── Ping-pong storage textures (Compute I/O) ──────────────────────────────
  // DX11: ID3D11Texture2D (UAV) → WebGPU: storage_2d<rgba8unorm, write>
  const mkStorage = () => device.createTexture({
    size: [W, H], format: 'rgba8unorm',
    usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
  });
  const texA = mkStorage(); // ping
  const texB = mkStorage(); // pong

  // ── Uniform buffer ────────────────────────────────────────────────────────
  // DX11: cbuffer BlurParams { uint width, height, radius; }
  const uniformBuf = device.createBuffer({
    size: 16, // 3x u32 + padding = 16 bytes (align to 16)
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  // ── WGSL Compute Shader ───────────────────────────────────────────────────
  // 수평 패스: 각 픽셀에서 [-radius, +radius] 범위의 가중치 합산
  // DX11 CS: [numthreads(8,8,1)] → WebGPU: @workgroup_size(8,8)
  const computeModule = device.createShaderModule({ code: `
    struct Params {
      width  : u32,
      height : u32,
      radius : u32,
    }
    @group(0) @binding(0) var<uniform>          p    : Params;
    @group(0) @binding(1) var                   src  : texture_2d<f32>;
    @group(0) @binding(2) var                   dst  : texture_storage_2d<rgba8unorm, write>;

    @compute @workgroup_size(8, 8)
    fn cs_main(@builtin(global_invocation_id) id : vec3u) {
      if id.x >= p.width || id.y >= p.height { return; }

      let r  = i32(p.radius);
      let diam = f32(2 * r + 1);
      var acc = vec4f(0.0);

      // 수평 Box Filter: sum(src[x-r..x+r, y]) / (2r+1)
      for (var dx = -r; dx <= r; dx++) {
        let sx = clamp(i32(id.x) + dx, 0, i32(p.width)  - 1);
        acc += textureLoad(src, vec2i(sx, i32(id.y)), 0);
      }
      textureStore(dst, vec2i(id.xy), acc / diam);
    }
  `});

  const computePipeline = device.createComputePipeline({
    layout: 'auto',
    compute: { module: computeModule, entryPoint: 'cs_main' },
  });

  // ── WGSL Render Shader ────────────────────────────────────────────────────
  // Storage texture → fullscreen quad → swapchain
  const renderModule = device.createShaderModule({ code: `
    @vertex
    fn vs(@builtin(vertex_index) vi : u32) -> @builtin(position) vec4f {
      var pos = array<vec2f,6>(
        vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1),
        vec2f(-1, 1), vec2f(1,-1), vec2f( 1,1),
      );
      return vec4f(pos[vi], 0.0, 1.0);
    }
    @group(0) @binding(0) var tex  : texture_2d<f32>;
    @group(0) @binding(1) var samp : sampler;
    @fragment
    fn fs(@builtin(position) pos : vec4f) -> @location(0) vec4f {
      let uv = pos.xy / vec2f(${W}.0, ${H}.0);
      return textureSample(tex, samp, uv);
    }
  `});

  const renderPipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex:   { module: renderModule, entryPoint: 'vs' },
    fragment: { module: renderModule, entryPoint: 'fs', targets: [{ format: fmt }] },
    primitive: { topology: 'triangle-list' },
  });

  const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

  const computeLayout = computePipeline.getBindGroupLayout(0);
  const renderLayout  = renderPipeline.getBindGroupLayout(0);

  // Bind group builder (input → output texture)
  const makeCBG = (src, dst) => device.createBindGroup({
    layout: computeLayout,
    entries: [
      { binding: 0, resource: { buffer: uniformBuf } },
      { binding: 1, resource: src.createView() },
      { binding: 2, resource: dst.createView() },
    ],
  });
  const makeRBG = (src) => device.createBindGroup({
    layout: renderLayout,
    entries: [
      { binding: 0, resource: src.createView() },
      { binding: 1, resource: sampler },
    ],
  });

  // Pre-build bind groups
  // Pass 0: inputTex → texA
  // Pass 1: texA    → texB
  // Pass 2: texB    → texA  ... etc. (ping-pong)
  const bgInit = makeCBG(inputTex, texA); // input → A (first pass)
  const bgAtoB = makeCBG(texA, texB);
  const bgBtoA = makeCBG(texB, texA);
  const rbgA   = makeRBG(texA);
  const rbgB   = makeRBG(texB);

  function doRender() {
    device.queue.writeBuffer(uniformBuf, 0,
      new Uint32Array([W, H, blurRadius, 0]));

    const encoder = device.createCommandEncoder();

    // ── Compute Pass(es) — DX11 Dispatch(ceil(W/8), ceil(H/8), 1) ──────────
    for (let i = 0; i < blurPasses; i++) {
      const cp = encoder.beginComputePass();
      cp.setPipeline(computePipeline);
      if (i === 0) cp.setBindGroup(0, bgInit);       // input → A
      else if (i % 2 === 1) cp.setBindGroup(0, bgAtoB); // A → B
      else                  cp.setBindGroup(0, bgBtoA); // B → A
      cp.dispatchWorkgroups(Math.ceil(W / 8), Math.ceil(H / 8));
      cp.end();
    }

    // Which texture holds the final result?
    // pass=1: A  pass=2: B  pass=3: A ...
    const finalRBG = (blurPasses % 2 === 1) ? rbgA : rbgB;

    // ── Render Pass — fullscreen quad ─────────────────────────────────────
    const rp = encoder.beginRenderPass({
      colorAttachments: [{
        view: ctx.getCurrentTexture().createView(),
        clearValue: [0.1, 0.1, 0.1, 1], loadOp: 'clear', storeOp: 'store',
      }],
    });
    rp.setPipeline(renderPipeline);
    rp.setBindGroup(0, finalRBG);
    rp.draw(6);
    rp.end();

    device.queue.submit([encoder.finish()]);
  }

  let pending = false;
  window.scheduleRender = function() {
    if (!pending) { pending = true; requestAnimationFrame(() => { pending = false; doRender(); }); }
  };

  doRender();
  document.getElementById('msg').textContent =
    `WebGPU Compute  |  ${W}×${H}  |  수평 Box Filter — radius=${blurRadius}, passes=${blurPasses}`;
}

main().catch(err => {
  document.getElementById('cOut').style.display = 'none';
  const el = document.getElementById('err');
  el.style.display = 'block';
  el.innerHTML = `<strong>WebGPU 초기화 실패</strong><br>${err.message}<br><br>
    Chrome 113+ / Edge 113+ 브라우저에서 실행해주세요.`;
  document.getElementById('msg').textContent = '';
  window.scheduleRender = () => {};
});
</script>
</body>
</html>
