<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>DirectX 11 — Enable ImGui background color slider to control canvas color</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #1a1a2e; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #unsupported {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5em;
            text-align: center;
        }
    
    /* == Mobile responsive == */
    @media (max-width: 768px) {
      canvas { max-width: 100% !important; height: auto !important; }
      .viewport-container { width: 100% !important; height: auto !important; }
      .dx-body { padding: 10px !important; gap: 10px !important; }
      .control-panel { min-width: unset !important; width: 100% !important; max-height: none !important; }
      #imgui-panel { position: relative !important; top: auto !important; left: auto !important; width: calc(100% - 20px) !important; margin: 10px auto !important; max-height: 55vh; overflow-y: auto; }
    }

  </style>
</head>
<body>
    <div id="unsupported" style="display:none;">
        WebGPU는 이 브라우저 또는 환경에서 지원되지 않습니다.<br>
        최신 버전의 Chrome, Edge 또는 Firefox를 사용해 보세요.
    </div>
    <canvas id="webgpu-canvas"></canvas>

            fn vs_main(@builtin(vertex_index) vertexIndex : u32) -> VertexOutput {
                let pos = array<vec2f, 6>(
                    vec2f(-1.0, -1.0), vec2f(1.0, -1.0), vec2f(1.0, 1.0),
                    vec2f(-1.0, -1.0), vec2f(1.0, 1.0), vec2f(-1.0, 1.0)
                );
                let uv_coords = array<vec2f, 6>(
                    vec2f(0.0, 1.0), vec2f(1.0, 1.0), vec2f(1.0, 0.0),
                    vec2f(0.0, 1.0), vec2f(1.0, 0.0), vec2f(0.0, 0.0)
                );

                var output: VertexOutput;
                output.clip_position = vec4f(pos[vertexIndex], 0.0, 1.0);
                output.uv = uv_coords[vertexIndex];
                return output;
            }

            @group(0) @binding(0) var mySampler: sampler;
            @group(0) @binding(1) var myTexture: texture_2d<f32>;

            @fragment
            fn fs_main(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(myTexture, mySampler, uv);
            }
        `;

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: {
                module: device.createShaderModule({ code: renderShaderWGSL }),
                entryPoint: 'vs_main',
            },
            fragment: {
                module: device.createShaderModule({ code: renderShaderWGSL }),
                entryPoint: 'fs_main',
                targets: [{ format: presentationFormat }],
            },
            primitive: {
                topology: 'triangle-list',
            },
        });

        const sampler = device.createSampler({
            magFilter: 'linear',
            minFilter: 'linear',
        });

        // Bind Groups (will be updated on canvas resize)
        let computeBindGroup;
        let renderBindGroup;

        function updateBindGroups() {
            computeBindGroup = device.createBindGroup({
                layout: computePipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: uniformBuffer } },
                    { binding: 1, resource: canvasTexture.createView() },
                ],
            });

            renderBindGroup = device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: sampler },
                    { binding: 1, resource: canvasTexture.createView() },
                ],
            });
        }
        updateBindGroups(); // Initial setup

        let lastBackgroundColor = new Float32Array(backgroundColor); // To detect changes

        function frame(time) {
            if (!renderScheduled) {
                return;
            }
            renderScheduled = false; // Reset flag

            // ImGui frame logic
            ImGui_Impl.NewFrame(time / 1000); // Pass current time in seconds
            ImGui.NewFrame();

            ImGui.Begin("배경색");
            const changed = ImGui.SliderFloat3("RGB (0.0->1.0)", backgroundColor, 0.0, 1.0);
            ImGui.End();

            // 5. Slider change -> device.queue.writeBuffer -> scheduleRender()
            // Check if backgroundColor changed
            let colorChanged = false;
            for (let i = 0; i < 3; ++i) { // Only compare RGB values modified by SliderFloat3
                if (backgroundColor[i] !== lastBackgroundColor[i]) {
                    colorChanged = true;
                    break;
                }
            }

            if (changed || colorChanged) {
                device.queue.writeBuffer(uniformBuffer, 0, backgroundColor); // Write the entire RGBA
                lastBackgroundColor.set(backgroundColor); // Update last known value
                scheduleRender(); // Re-schedule render if value changes
            }

            ImGui.Render();

            const commandEncoder = device.createCommandEncoder();

            // Compute Pass
            const computePassEncoder = commandEncoder.beginComputePass();
            computePassEncoder.setPipeline(computePipeline);
            computePassEncoder.setBindGroup(0, computeBindGroup);
            const workgroupX = Math.ceil(canvas.width / 8);
            const workgroupY = Math.ceil(canvas.height / 8);
            computePassEncoder.dispatchWorkgroups(workgroupX, workgroupY);
            computePassEncoder.end();

            // Render Pass
            const renderPassEncoder = commandEncoder.beginRenderPass({
                colorAttachments: [
                    {
                        view: context.getCurrentTexture().createView(),
                        clearValue: { r: 26/255, g: 26/255, b: 46/255, a: 1.0 }, // Background color matching body
                        loadOp: 'clear',
                        storeOp: 'store',
                    },
                ],
            });
            renderPassEncoder.setPipeline(renderPipeline);
            renderPassEncoder.setBindGroup(0, renderBindGroup);
            renderPassEncoder.draw(6); // Render fullscreen quad
            ImGui_Impl.Render(renderPassEncoder); // Render ImGui on top
            renderPassEncoder.end();

            device.queue.submit([commandEncoder.finish()]);

            // Request next frame only if necessary
            if (renderScheduled) {
                 requestAnimationFrame(frame);
            }
        }

        function scheduleRender() {
            if (!renderScheduled) {
                renderScheduled = true;
                requestAnimationFrame(frame);
            }
        }

        // Initial uniform buffer data and render schedule
        device.queue.writeBuffer(uniformBuffer, 0, backgroundColor);
        scheduleRender();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Recreate canvasTexture and update bind groups on resize
            canvasTexture = createComputeOutputTexture(device, canvas.width, canvas.height);
            updateBindGroups();
            scheduleRender(); // Request a new render to apply changes
        });
    }

    // Call the initialization function
    initializeWebGPU();
    </script>
