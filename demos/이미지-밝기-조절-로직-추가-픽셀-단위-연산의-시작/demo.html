<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DirectX 11 — 이미지 밝게 만들기</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a2e;
            color: #cccccc;
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }
        #app-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        #header {
            background-color: #2a2a3a;
            padding: 8px;
            border-bottom: 1px solid #444;
            text-align: center;
            font-weight: bold;
            color: #eee;
            /* Mimic draggable title bar - browser specific, might not work universally */
            /* -webkit-app-region: drag; */
        }
        #main-content {
            display: flex;
            flex-grow: 1;
        }
        #control-panel {
            width: 280px;
            background-color: #2b2b2b;
            border-right: 1px solid #444;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ddd;
        }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 8px;
            background: #555;
            border-radius: 4px;
            outline: none;
            transition: opacity .2s;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #007acc; /* ImGui blue */
            cursor: grab;
            border: 1px solid #eee;
        }
        input[type="range"]::-webkit-slider-thumb:active {
            cursor: grabbing;
        }
        .slider-value {
            text-align: right;
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
        }
        #canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a2e; /* Match body background */
            padding: 15px;
            box-sizing: border-box;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            border: 1px solid #444; /* Border for the canvas */
            display: block;
            background-color: black; /* In case texture doesn't load */
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="header">DirectX 11 — 이미지 밝게 만들기</div>
        <div id="main-content">
            <div id="control-panel">
                <div class="control-group">
                    <label for="brighteningFactor">밝기 배수</label>
                    <input type="range" id="brighteningFactor" min="0.1" max="5.0" step="0.01" value="1.2">
                    <div class="slider-value" id="brighteningFactorValue">1.20</div>
                </div>
                <div class="control-group">
                    <label>이미지 정보</label>
                    <div style="font-size: 0.9em;">
                        <p>너비: <span id="imageWidthDisplay"></span></p>
                        <p>높이: <span id="imageHeightDisplay"></span></p>
                    </div>
                </div>
            </div>
            <div id="canvas-container">
                <canvas id="webgpu-canvas"></canvas>
            </div>
        </div>
    </div>

    <script type="text/wgsl" id="compute-shader">
        // commit message: •feat: add image brightening logic
        // DX11: RWTexture2D<float4> (UAV) -> WebGPU: texture_storage_2d<rgba8unorm, write>
        // DX11: [numthreads(8,8,1)] -> WebGPU: @workgroup_size(8,8)
        // DX11: SV_DispatchThreadID -> WebGPU: @builtin(global_invocation_id)
        // DX11: cbuffer { float4 x; } -> WebGPU: struct Params { x: vec4f } + var<uniform>

        @group(0) @binding(0) var<uniform> params: Params;
        @group(0) @binding(1) var inputImage: texture_2d<f32>; // Read original image
        @group(0) @binding(2) var outputImage: texture_storage_2d<rgba8unorm, write>; // Write brightened image

        struct Params {
            brighteningFactor: f32,
            imageWidth: u32,
            imageHeight: u32,
        };

        @compute @workgroup_size(8, 8)
        fn main(@builtin(global_invocation_id) global_id: vec3u) {
            let x = global_id.x;
            let y = global_id.y;

            // Check bounds to prevent out-of-bounds access
            if x >= params.imageWidth || y >= params.imageHeight {
                return;
            }

            let coords = vec2u(x, y);
            var pixel = textureLoad(inputImage, coords, 0); // Read original pixel (mip level 0)
            
            // DX11 C++ logic: image.pixels[i].v[0] *= 1.2f;
            // 'v[0]' typically corresponds to the Red channel.
            // For general image brightening, it's more common to multiply all RGB channels.
            // We'll multiply all RGB channels for a visually balanced brightening effect.
            // If strict adherence to 'v[0]' (Red channel only) is required, change pixel.rgb to pixel.r
            pixel.rgb *= params.brighteningFactor;
            
            // Clamp to [0, 1] range to fit into rgba8unorm texture format
            pixel = clamp(pixel, vec4f(0.0), vec4f(1.0));

            textureStore(outputImage, coords, pixel); // Write brightened pixel
        }
    </script>

    <script type="text/wgsl" id="vertex-shader">
        struct VertexOutput {
            @builtin(position) position: vec4f,
            @location(0) uv: vec2f,
        };

        @vertex
        fn main(@builtin(vertex_index) vertexIndex: u32) -> VertexOutput {
            var pos = array<vec2f, 6>(
                vec2f(-1.0, -1.0),
                vec2f(1.0, -1.0),
                vec2f(-1.0, 1.0),
                vec2f(-1.0, 1.0),
                vec2f(1.0, -1.0),
                vec2f(1.0, 1.0)
            );
            var uv = array<vec2f, 6>(
                vec2f(0.0, 1.0),
                vec2f(1.0, 1.0),
                vec2f(0.0, 0.0),
                vec2f(0.0, 0.0),
                vec2f(1.0, 1.0),
                vec2f(1.0, 0.0)
            );

            var output: VertexOutput;
            output.position = vec4f(pos[vertexIndex], 0.0, 1.0);
            output.uv = uv[vertexIndex];
            return output;
        }
    </script>

    <script type="text/wgsl" id="fragment-shader">
        @group(0) @binding(0) var mySampler: sampler;
        @group(0) @binding(1) var myTexture: texture_2d<f32>; // The output texture from compute pass

        struct VertexOutput {
            @builtin(position) position: vec4f,
            @location(0) uv: vec2f,
        };

        @fragment
        fn main(input: VertexOutput) -> @location(0) vec4f {
            return textureSample(myTexture, mySampler, input.uv);
        }
    </script>

    <script>
        // Global WebGPU objects
        let device = null;
        let context = null;
        let presentationFormat = null;
        let canvas = null;

        // Compute pipeline objects
        let computePipeline = null;
        let computeBindGroup = null;
        let uniformBuffer = null;
        let inputTexture = null;
        let outputTexture = null;

        // Render pipeline objects
        let renderPipeline = null;
        let renderBindGroup = null;
        let sampler = null;

        // Image parameters
        const IMAGE_WIDTH = 512;
        const IMAGE_HEIGHT = 512;
        let brighteningFactor = 1.2;

        // UI elements
        let brighteningFactorSlider = null;
        let brighteningFactorValueDisplay = null;
        let imageWidthDisplay = null;
        let imageHeightDisplay = null;

        let animationFrameId = null;

        async function initWebGPU() {
            if (!navigator.gpu) {
                document.body.innerHTML = '<p>WebGPU를 지원하지 않는 브라우저입니다. Chrome Canary 또는 최신 Edge를 사용해 보세요.</p>';
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                document.body.innerHTML = '<p>WebGPU 어댑터를 찾을 수 없습니다.</p>';
                return;
            }

            device = await adapter.requestDevice();
            canvas = document.getElementById('webgpu-canvas');
            context = canvas.getContext('webgpu');

            presentationFormat = navigator.gpu.getPreferredCanvasFormat();
            context.configure({
                device,
                format: presentationFormat,
                alphaMode: 'opaque',
            });

            // Set canvas size
            canvas.width = IMAGE_WIDTH; // Fixed internal resolution
            canvas.height = IMAGE_HEIGHT;
            // Use CSS to control display size. The render pass will stretch the texture.

            initResources();
            initComputePipeline();
            initRenderPipeline();
            createUI();

            render(); // Initial render
        }

        function createCheckerboardData(width, height) {
            const data = new Uint8ClampedArray(width * height * 4); // RGBA
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    // Simple checkerboard with two shades of grey
                    const color = (((x / 32 | 0) + (y / 32 | 0)) % 2 == 0) ? 200 : 80;
                    data[i + 0] = color;     // R
                    data[i + 1] = color;     // G
                    data[i + 2] = color;     // B
                    data[i + 3] = 255;   // A
                }
            }
            return data;
        }

        function initResources() {
            // 1. Uniform Buffer for parameters
            uniformBuffer = device.createBuffer({
                size: 3 * 4 + 4, // 1 float (brighteningFactor), 2 uints (width, height) + padding
                usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
            });

            // Initial uniform data
            updateUniformBuffer();

            // 2. Storage Texture (Input and Output)
            const initialImageData = createCheckerboardData(IMAGE_WIDTH, IMAGE_HEIGHT);

            inputTexture = device.createTexture({
                size: [IMAGE_WIDTH, IMAGE_HEIGHT, 1],
                format: 'rgba8unorm',
                usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
            });

            device.queue.writeTexture(
                { texture: inputTexture },
                initialImageData,
                {
                    bytesPerRow: IMAGE_WIDTH * 4,
                    rowsPerImage: IMAGE_HEIGHT,
                },
                [IMAGE_WIDTH, IMAGE_HEIGHT, 1]
            );

            outputTexture = device.createTexture({
                size: [IMAGE_WIDTH, IMAGE_HEIGHT, 1],
                format: 'rgba8unorm',
                usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
            });

            // Sampler for the render pass
            sampler = device.createSampler({
                magFilter: 'linear',
                minFilter: 'linear',
            });
        }

        function updateUniformBuffer() {
            const uniformData = new Float32Array([
                brighteningFactor,
                IMAGE_WIDTH, // Stored as float, but used as u32 in WGSL (careful with types)
                IMAGE_HEIGHT, // Stored as float
                0, // Padding
            ]);
            device.queue.writeBuffer(uniformBuffer, 0, uniformData);
        }

        function initComputePipeline() {
            const computeShaderModule = device.createShaderModule({
                code: document.getElementById('compute-shader').textContent,
            });

            const computeBindGroupLayout = device.createBindGroupLayout({
                entries: [
                    {
                        binding: 0, // Params uniform buffer
                        visibility: GPUShaderStage.COMPUTE,
                        buffer: { type: 'uniform' },
                    },
                    {
                        binding: 1, // Input texture (read-only)
                        visibility: GPUShaderStage.COMPUTE,
                        texture: { sampleType: 'float' },
                    },
                    {
                        binding: 2, // Output storage texture (write-only)
                        visibility: GPUShaderStage.COMPUTE,
                        storageTexture: { format: 'rgba8unorm' },
                    },
                ],
            });

            computePipeline = device.createComputePipeline({
                layout: device.createPipelineLayout({
                    bindGroupLayouts: [computeBindGroupLayout],
                }),
                compute: {
                    module: computeShaderModule,
                    entryPoint: 'main',
                },
            });

            computeBindGroup = device.createBindGroup({
                layout: computeBindGroupLayout,
                entries: [
                    {
                        binding: 0,
                        resource: { buffer: uniformBuffer },
                    },
                    {
                        binding: 1,
                        resource: inputTexture.createView(),
                    },
                    {
                        binding: 2,
                        resource: outputTexture.createView(),
                    },
                ],
            });
        }

        function initRenderPipeline() {
            const vertexShaderModule = device.createShaderModule({
                code: document.getElementById('vertex-shader').textContent,
            });
            const fragmentShaderModule = device.createShaderModule({
                code: document.getElementById('fragment-shader').textContent,
            });

            const renderBindGroupLayout = device.createBindGroupLayout({
                entries: [
                    {
                        binding: 0, // Sampler
                        visibility: GPUShaderStage.FRAGMENT,
                        sampler: { type: 'filtering' },
                    },
                    {
                        binding: 1, // Texture from compute pass
                        visibility: GPUShaderStage.FRAGMENT,
                        texture: { sampleType: 'float' },
                    },
                ],
            });

            renderPipeline = device.createRenderPipeline({
                layout: device.createPipelineLayout({
                    bindGroupLayouts: [renderBindGroupLayout],
                }),
                vertex: {
                    module: vertexShaderModule,
                    entryPoint: 'main',
                },
                fragment: {
                    module: fragmentShaderModule,
                    entryPoint: 'main',
                    targets: [{ format: presentationFormat }],
                },
                primitive: {
                    topology: 'triangle-list',
                },
            });

            renderBindGroup = device.createBindGroup({
                layout: renderBindGroupLayout,
                entries: [
                    {
                        binding: 0,
                        resource: sampler,
                    },
                    {
                        binding: 1,
                        resource: outputTexture.createView(),
                    },
                ],
            });
        }

        function render() {
            if (!device) return;

            const commandEncoder = device.createCommandEncoder();

            // Compute Pass
            const computePassEncoder = commandEncoder.beginComputePass();
            computePassEncoder.setPipeline(computePipeline);
            computePassEncoder.setBindGroup(0, computeBindGroup);
            // DX11: Dispatch(W/8, H/8, 1) -> WebGPU: dispatchWorkgroups(ceil(W/8), ceil(H/8))
            const workgroupX = Math.ceil(IMAGE_WIDTH / 8);
            const workgroupY = Math.ceil(IMAGE_HEIGHT / 8);
            computePassEncoder.dispatchWorkgroups(workgroupX, workgroupY, 1);
            computePassEncoder.end();

            // Render Pass
            const textureView = context.getCurrentTexture().createView();
            const renderPassEncoder = commandEncoder.beginRenderPass({
                colorAttachments: [
                    {
                        view: textureView,
                        clearValue: { r: 0.1, g: 0.1, b: 0.2, a: 1.0 }, // Background color #1a1a2e
                        loadOp: 'clear',
                        storeOp: 'store',
                    },
                ],
            });
            renderPassEncoder.setPipeline(renderPipeline);
            renderPassEncoder.setBindGroup(0, renderBindGroup);
            renderPassEncoder.draw(6); // Draw fullscreen quad (6 vertices for two triangles)
            renderPassEncoder.end();

            device.queue.submit([commandEncoder.finish()]);
            animationFrameId = null; // Reset animation frame ID after submission
        }

        // Debounce render calls to only happen on next requestAnimationFrame
        function scheduleRender() {
            if (!animationFrameId) {
                animationFrameId = requestAnimationFrame(render);
            }
        }

        function createUI() {
            brighteningFactorSlider = document.getElementById('brighteningFactor');
            brighteningFactorValueDisplay = document.getElementById('brighteningFactorValue');
            imageWidthDisplay = document.getElementById('imageWidthDisplay');
            imageHeightDisplay = document.getElementById('imageHeightDisplay');

            brighteningFactorSlider.value = brighteningFactor;
            brighteningFactorValueDisplay.textContent = brighteningFactor.toFixed(2);
            imageWidthDisplay.textContent = IMAGE_WIDTH;
            imageHeightDisplay.textContent = IMAGE_HEIGHT;

            brighteningFactorSlider.addEventListener('input', (event) => {
                brighteningFactor = parseFloat(event.target.value);
                brighteningFactorValueDisplay.textContent = brighteningFactor.toFixed(2);
                updateUniformBuffer();
                scheduleRender();
            });
        }

        window.addEventListener('load', initWebGPU);
    </script>
</body>
</html>
