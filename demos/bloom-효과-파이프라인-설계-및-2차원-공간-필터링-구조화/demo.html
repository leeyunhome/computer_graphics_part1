<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DirectX 11 — Bloom Effect Pipeline</title>
  <style>
    body {
      margin: 0; padding: 0;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      display: flex;
    }
    #imgui-panel {
      position: absolute;
      top: 10px; left: 10px;
      width: 320px;
      background-color: rgba(22, 22, 37, 0.95);
      border: 1px solid #4f4f6a;
      border-radius: 4px;
      padding: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 10;
      font-size: 13px;
    }
    .panel-header {
      font-weight: bold; font-size: 14px;
      border-bottom: 1px solid #4f4f6a;
      padding-bottom: 8px; margin-bottom: 12px;
      color: #00bcd4;
      display: flex; justify-content: space-between; align-items: center;
    }
    .control-group { margin-bottom: 14px; }
    .control-group label { display: block; margin-bottom: 5px; color: #b0b0cf; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type="range"] {
      flex: 1; accent-color: #00bcd4;
      background: #2a2a40; border: 1px solid #4f4f6a;
      height: 6px; border-radius: 3px; outline: none;
    }
    .val-display { width: 45px; text-align: right; font-family: monospace; color: #00bcd4; }
    button {
      background-color: #00bcd4; color: #121212; border: none;
      padding: 8px 12px; border-radius: 3px; cursor: pointer;
      font-weight: bold; width: 100%; margin-top: 8px;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #00e5ff; }
    #canvas-container {
      width: 100vw; height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background-color: #0f0f1b;
    }
    canvas {
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      border: 1px solid #33334c;
      max-width: 90%; max-height: 90%;
    }
    #error-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15,15,27,0.9);
      display: none; justify-content: center; align-items: center;
      color: #ff5555; font-size: 18px; font-weight: bold; z-index: 100;
    }
  
    /* == Mobile responsive == */
    @media (max-width: 768px) {
      canvas { max-width: 100% !important; height: auto !important; }
      .viewport-container { width: 100% !important; height: auto !important; }
      .dx-body { padding: 10px !important; gap: 10px !important; }
      .control-panel { min-width: unset !important; width: 100% !important; max-height: none !important; }
      #imgui-panel { position: relative !important; top: auto !important; left: auto !important; width: calc(100% - 20px) !important; margin: 10px auto !important; max-height: 55vh; overflow-y: auto; }
    }

  </style>
</head>
<body>

  <div id="error-overlay">WebGPU를 지원하지 않는 브라우저이거나 구동에 실패했습니다.</div>

  <div id="imgui-panel">
    <div class="panel-header">
      <span>DirectX 11 — Bloom Pipeline</span>
      <span style="font-size:10px;color:#888">v1.0.0</span>
    </div>
    <div class="control-group">
      <label>임계값 (Brightness Threshold)</label>
      <div class="slider-row">
        <input type="range" id="threshold-slider" min="0.0" max="1.0" step="0.01" value="0.50">
        <span class="val-display" id="threshold-val">0.50</span>
      </div>
    </div>
    <div class="control-group">
      <label>블러 범위 (Gaussian Sigma)</label>
      <div class="slider-row">
        <input type="range" id="sigma-slider" min="0.5" max="10.0" step="0.1" value="3.0">
        <span class="val-display" id="sigma-val">3.0</span>
      </div>
    </div>
    <div class="control-group">
      <label>블룸 강도 (Bloom Intensity)</label>
      <div class="slider-row">
        <input type="range" id="intensity-slider" min="0.0" max="3.0" step="0.05" value="1.50">
        <span class="val-display" id="intensity-val">1.50</span>
      </div>
    </div>
    <button id="reset-btn">이미지 리셋 (Reset Source)</button>
<div class="collapsing-header" style="margin-top:15px;">IMAGE SOURCE</div>
<div class="control-group">
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;" id="img-thumbnails">
    <img class="img-thumb" data-src="../../images/colosseum.jpg" src="../../images/colosseum.jpg" title="colosseum" style="width:64px;height:48px;object-fit:cover;cursor:pointer;border-radius:3px;border:2px solid #007acc;opacity:1;">
    <img class="img-thumb" data-src="../../images/landscape.jpg" src="../../images/landscape.jpg" title="landscape" style="width:64px;height:48px;object-fit:cover;cursor:pointer;border-radius:3px;border:2px solid transparent;opacity:0.7;">
    <img class="img-thumb" data-src="../../images/portrait.jpg" src="../../images/portrait.jpg" title="portrait" style="width:64px;height:48px;object-fit:cover;cursor:pointer;border-radius:3px;border:2px solid transparent;opacity:0.7;">
    <img class="img-thumb" data-src="../../images/city.jpg" src="../../images/city.jpg" title="city" style="width:64px;height:48px;object-fit:cover;cursor:pointer;border-radius:3px;border:2px solid transparent;opacity:0.7;">
    <img class="img-thumb" data-src="../../images/st-p.jpg" src="../../images/st-p.jpg" title="st-p" style="width:64px;height:48px;object-fit:cover;cursor:pointer;border-radius:3px;border:2px solid transparent;opacity:0.7;">
    <img class="img-thumb" data-src="../../images/swiss-guards.jpg" src="../../images/swiss-guards.jpg" title="swiss-guards" style="width:64px;height:48px;object-fit:cover;cursor:pointer;border-radius:3px;border:2px solid transparent;opacity:0.7;">
  </div>
  <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#8a8a9a;cursor:pointer;margin-top:4px;">
    <input type="file" id="img-file-upload" accept="image/*" style="display:none;">
    <span style="background:#202030;padding:3px 8px;border-radius:3px;border:1px solid #44445a;">📁 로컬 파일</span>
  </label>
</div>
  </div>

  <div id="canvas-container">
    <canvas id="webgpu-canvas"></canvas>
  </div>

  <script>
    let currentImageSrc = "../../images/colosseum.jpg";
    async function _setImage(src) {
        currentImageSrc = src;
        if (typeof init === "function") { await init(); }
        else if (typeof initWebGPU === "function") { await initWebGPU(); }
    }

    // Pass 1: 밝기 추출 (Brightness Extraction)
    const EXTRACT_SHADER = `
      struct Params { threshold: f32, sigma: f32, dummy0: f32, intensity: f32 }
      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var inputTex: texture_2d<f32>;
      @group(0) @binding(2) var brightTex: texture_storage_2d<rgba8unorm, write>;
      @compute @workgroup_size(8,8)
      fn main(@builtin(global_invocation_id) id: vec3u) {
        let size = textureDimensions(inputTex);
        if (id.x >= size.x || id.y >= size.y) { return; }
        let color = textureLoad(inputTex, id.xy, 0).rgb;
        let luma = dot(color, vec3f(0.299, 0.587, 0.114));
        var bright = vec3f(0.0);
        if (luma > params.threshold) {
          bright = color * (luma - params.threshold) / (1.0 - params.threshold + 0.0001);
        }
        textureStore(brightTex, id.xy, vec4f(bright, 1.0));
      }
    `;

    // Pass 2: 수평 가우시안 블러
    const BLUR_H_SHADER = `
      struct Params { threshold: f32, sigma: f32, dummy0: f32, intensity: f32 }
      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var srcTex: texture_2d<f32>;
      @group(0) @binding(2) var dstTex: texture_storage_2d<rgba8unorm, write>;
      fn gauss(x: f32, sigma: f32) -> f32 { return exp(-(x*x) / (2.0*sigma*sigma)); }
      @compute @workgroup_size(8,8)
      fn main(@builtin(global_invocation_id) id: vec3u) {
        let size = textureDimensions(srcTex);
        if (id.x >= size.x || id.y >= size.y) { return; }
        var col = vec3f(0.0); var wsum = 0.0;
        let r = i32(ceil(params.sigma * 3.0));
        for (var i = -r; i <= r; i++) {
          let cx = clamp(i32(id.x) + i, 0, i32(size.x) - 1);
          let w = gauss(f32(i), params.sigma);
          col += textureLoad(srcTex, vec2u(u32(cx), id.y), 0).rgb * w;
          wsum += w;
        }
        textureStore(dstTex, id.xy, vec4f(col / max(wsum, 0.0001), 1.0));
      }
    `;

    // Pass 3: 수직 가우시안 블러
    const BLUR_V_SHADER = `
      struct Params { threshold: f32, sigma: f32, dummy0: f32, intensity: f32 }
      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var srcTex: texture_2d<f32>;
      @group(0) @binding(2) var dstTex: texture_storage_2d<rgba8unorm, write>;
      fn gauss(x: f32, sigma: f32) -> f32 { return exp(-(x*x) / (2.0*sigma*sigma)); }
      @compute @workgroup_size(8,8)
      fn main(@builtin(global_invocation_id) id: vec3u) {
        let size = textureDimensions(srcTex);
        if (id.x >= size.x || id.y >= size.y) { return; }
        var col = vec3f(0.0); var wsum = 0.0;
        let r = i32(ceil(params.sigma * 3.0));
        for (var i = -r; i <= r; i++) {
          let cy = clamp(i32(id.y) + i, 0, i32(size.y) - 1);
          let w = gauss(f32(i), params.sigma);
          col += textureLoad(srcTex, vec2u(id.x, u32(cy)), 0).rgb * w;
          wsum += w;
        }
        textureStore(dstTex, id.xy, vec4f(col / max(wsum, 0.0001), 1.0));
      }
    `;

    // Pass 4: 블룸 합성 (Base + Bloom)
    const COMPOSITE_SHADER = `
      struct Params { threshold: f32, sigma: f32, dummy0: f32, intensity: f32 }
      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var baseTex: texture_2d<f32>;
      @group(0) @binding(2) var blurTex: texture_2d<f32>;
      @group(0) @binding(3) var finalTex: texture_storage_2d<rgba8unorm, write>;
      @compute @workgroup_size(8,8)
      fn main(@builtin(global_invocation_id) id: vec3u) {
        let size = textureDimensions(baseTex);
        if (id.x >= size.x || id.y >= size.y) { return; }
        let base = textureLoad(baseTex, id.xy, 0).rgb;
        let blur = textureLoad(blurTex, id.xy, 0).rgb;
        let result = clamp(base + blur * params.intensity, vec3f(0.0), vec3f(1.0));
        textureStore(finalTex, id.xy, vec4f(result, 1.0));
      }
    `;

    // Pass 5: 화면 렌더링
    const RENDER_SHADER = `
      struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
      @vertex
      fn vs_main(@builtin(vertex_index) idx: u32) -> VSOut {
        var pos = array<vec2f,6>(vec2f(-1,-1),vec2f(1,-1),vec2f(-1,1),vec2f(-1,1),vec2f(1,-1),vec2f(1,1));
        var uv  = array<vec2f,6>(vec2f(0,1),vec2f(1,1),vec2f(0,0),vec2f(0,0),vec2f(1,1),vec2f(1,0));
        var o: VSOut; o.pos = vec4f(pos[idx],0,1); o.uv = uv[idx]; return o;
      }
      @group(0) @binding(0) var tex: texture_2d<f32>;
      @group(0) @binding(1) var smp: sampler;
      @fragment
      fn fs_main(in: VSOut) -> @location(0) vec4f { return textureSample(tex, smp, in.uv); }
    `;

    async function loadImageNatural(url, maxW, maxH) {
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = () => reject(new Error(`이미지 로드 실패: ${url}`));
        img.src = url;
      });
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      return c;
    }

    async function init() {
      if (!navigator.gpu) { document.getElementById('error-overlay').style.display = 'flex'; return; }
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) { document.getElementById('error-overlay').style.display = 'flex'; return; }
      const device = await adapter.requestDevice();

      const canvas = document.getElementById('webgpu-canvas');
      const context = canvas.getContext('webgpu');
      const format = navigator.gpu.getPreferredCanvasFormat();

      // 이미지 원본 비율로 로드
      let srcCanvas;
      try {
        srcCanvas = await loadImageNatural(currentImageSrc, 800, 600);
      } catch (e) {
        // 폴백: 방사형 그라디언트
        srcCanvas = document.createElement('canvas');
        srcCanvas.width = 800; srcCanvas.height = 600;
        const ctx = srcCanvas.getContext('2d');
        const g = ctx.createRadialGradient(400, 300, 10, 400, 300, 350);
        g.addColorStop(0, '#ffffff'); g.addColorStop(0.3, '#ffaa00');
        g.addColorStop(0.6, '#0055ff'); g.addColorStop(1, '#000000');
        ctx.fillStyle = g; ctx.fillRect(0, 0, 800, 600);
      }

      const W = srcCanvas.width, H = srcCanvas.height;
      canvas.width = W; canvas.height = H;

      context.configure({ device, format, alphaMode: 'opaque' });

      const imgData = srcCanvas.getContext('2d').getImageData(0, 0, W, H);

      // 텍스처 생성 헬퍼
      const mkTex = (extraUsage) => device.createTexture({
        size: [W, H], format: 'rgba8unorm',
        usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST | extraUsage
      });

      const inputTex  = mkTex(0);
      const brightTex = mkTex(GPUTextureUsage.STORAGE_BINDING);
      const blurHTex  = mkTex(GPUTextureUsage.STORAGE_BINDING);
      const blurVTex  = mkTex(GPUTextureUsage.STORAGE_BINDING);
      const finalTex  = mkTex(GPUTextureUsage.STORAGE_BINDING);

      device.queue.writeTexture(
        { texture: inputTex }, imgData.data,
        { bytesPerRow: W * 4 }, { width: W, height: H }
      );

      // Uniform Buffer
      const uniformBuffer = device.createBuffer({
        size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
      });

      // 셰이더 모듈
      const mExtract   = device.createShaderModule({ code: EXTRACT_SHADER });
      const mBlurH     = device.createShaderModule({ code: BLUR_H_SHADER });
      const mBlurV     = device.createShaderModule({ code: BLUR_V_SHADER });
      const mComposite = device.createShaderModule({ code: COMPOSITE_SHADER });
      const mRender    = device.createShaderModule({ code: RENDER_SHADER });

      // 컴퓨트 파이프라인 (각자 layout:'auto')
      const pExtract   = device.createComputePipeline({ layout: 'auto', compute: { module: mExtract,   entryPoint: 'main' } });
      const pBlurH     = device.createComputePipeline({ layout: 'auto', compute: { module: mBlurH,     entryPoint: 'main' } });
      const pBlurV     = device.createComputePipeline({ layout: 'auto', compute: { module: mBlurV,     entryPoint: 'main' } });
      const pComposite = device.createComputePipeline({ layout: 'auto', compute: { module: mComposite, entryPoint: 'main' } });

      // 렌더 파이프라인
      const pRender = device.createRenderPipeline({
        layout: 'auto',
        vertex:   { module: mRender, entryPoint: 'vs_main' },
        fragment: { module: mRender, entryPoint: 'fs_main', targets: [{ format }] }
      });

      // Bind Groups
      const bgExtract = device.createBindGroup({
        layout: pExtract.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: inputTex.createView() },
          { binding: 2, resource: brightTex.createView() }
        ]
      });
      const bgBlurH = device.createBindGroup({
        layout: pBlurH.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: brightTex.createView() },
          { binding: 2, resource: blurHTex.createView() }
        ]
      });
      const bgBlurV = device.createBindGroup({
        layout: pBlurV.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: blurHTex.createView() },
          { binding: 2, resource: blurVTex.createView() }
        ]
      });
      const bgComposite = device.createBindGroup({
        layout: pComposite.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: inputTex.createView() },
          { binding: 2, resource: blurVTex.createView() },
          { binding: 3, resource: finalTex.createView() }
        ]
      });
      const sampler = device.createSampler({ minFilter: 'linear', magFilter: 'linear' });
      const bgRender = device.createBindGroup({
        layout: pRender.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: finalTex.createView() },
          { binding: 1, resource: sampler }
        ]
      });

      const params = { threshold: 0.50, sigma: 3.0, intensity: 1.50 };

      function updateUniforms() {
        device.queue.writeBuffer(uniformBuffer, 0,
          new Float32Array([params.threshold, params.sigma, 0.0, params.intensity])
        );
      }

      let pending = false;
      function render() {
        pending = false;
        updateUniforms();
        const enc = device.createCommandEncoder();
        const dispatch = (pass, bg) => {
          const p = enc.beginComputePass();
          p.setPipeline(pass); p.setBindGroup(0, bg);
          p.dispatchWorkgroups(Math.ceil(W/8), Math.ceil(H/8));
          p.end();
        };
        dispatch(pExtract,   bgExtract);
        dispatch(pBlurH,     bgBlurH);
        dispatch(pBlurV,     bgBlurV);
        dispatch(pComposite, bgComposite);

        const rp = enc.beginRenderPass({
          colorAttachments: [{
            view: context.getCurrentTexture().createView(),
            clearValue: { r: 0.1, g: 0.1, b: 0.18, a: 1.0 },
            loadOp: 'clear', storeOp: 'store'
          }]
        });
        rp.setPipeline(pRender);
        rp.setBindGroup(0, bgRender);
        rp.draw(6);
        rp.end();
        device.queue.submit([enc.finish()]);
      }

      function schedule() {
        if (!pending) { pending = true; requestAnimationFrame(render); }
      }

      if (!window._uiSetup_bloom_______________2_____________) {
          window._uiSetup_bloom_______________2_____________ = true;
          // UI
          const bind = (id, key, fixed) => {
            const sl = document.getElementById(`${id}-slider`);
            const vd = document.getElementById(`${id}-val`);
            sl.addEventListener('input', () => {
              params[key] = parseFloat(sl.value);
              vd.textContent = params[key].toFixed(fixed);
              schedule();
            });
          };
          bind('threshold', 'threshold', 2);
          bind('sigma',     'sigma',     1);
          bind('intensity', 'intensity', 2);

          document.getElementById('reset-btn').addEventListener('click', () => {
            device.queue.writeTexture(
              { texture: inputTex }, imgData.data,
              { bytesPerRow: W * 4 }, { width: W, height: H }
            );
            schedule();
          });

          _setupImagePicker();
      }

      schedule();
    }

    init();

    function _setupImagePicker() {
        document.querySelectorAll("#img-thumbnails .img-thumb").forEach(function(thumb) {
            thumb.addEventListener("click", async function() {
                document.querySelectorAll("#img-thumbnails .img-thumb").forEach(function(t) {
                    t.style.borderColor = "transparent";
                    t.style.opacity = "0.7";
                });
                thumb.style.borderColor = "#007acc";
                thumb.style.opacity = "1";
                await _setImage(thumb.getAttribute("data-src"));
            });
        });
        var fileInput = document.getElementById("img-file-upload");
        if (fileInput) {
            fileInput.addEventListener("change", async function(e) {
                if (!e.target.files[0]) return;
                var url = URL.createObjectURL(e.target.files[0]);
                document.querySelectorAll("#img-thumbnails .img-thumb").forEach(function(t) {
                    t.style.borderColor = "transparent"; t.style.opacity = "0.7";
                });
                await _setImage(url);
            });
        }
    }
  </script>
</body>
</html>
