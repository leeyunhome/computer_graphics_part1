<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>렌더 타겟 클리어 색상 + 입력 이미지</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #1a1a2e;
  color: #e2e8f0;
  width: 540px;
  padding: 16px;
}
h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
.tags { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.tag {
  background: #2d3748; color: #90cdf4; font-size: 0.7rem;
  padding: 2px 8px; border-radius: 10px; border: 1px solid #4a5568;
}
.window-frame {
  border: 1px solid #555; border-radius: 4px; overflow: hidden; margin-bottom: 10px;
}
.title-bar {
  background: #3c3c3c; color: #cccccc; font-size: 0.78rem;
  padding: 5px 10px; border-bottom: 1px solid #555;
  display: flex; align-items: center; gap: 6px;
}
.title-bar-dot { width: 10px; height: 10px; border-radius: 50%; }
.tb-red { background: #ff5f57; } .tb-yellow { background: #ffbd2e; } .tb-green { background: #28c840; }
.canvas-area { background: #0d0d1a; padding: 12px; display: flex; justify-content: center; }
canvas { border: 1px solid #333; display: block; }
.imgui-panel {
  background: #252526; border: 1px solid #555; border-radius: 4px;
  padding: 10px 12px; margin-bottom: 8px;
}
.imgui-title {
  font-size: 0.72rem; color: #9cdcfe; font-weight: 600;
  border-bottom: 1px solid #444; padding-bottom: 4px; margin-bottom: 8px;
}
.ctrl-row { margin-bottom: 8px; }
.ctrl-row label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.75rem; color: #d4d4d4; margin-bottom: 3px;
}
.ctrl-row label span { color: #9cdcfe; font-weight: 600; }
input[type=range] {
  width: 100%; height: 6px; -webkit-appearance: none;
  background: #3c3c3c; border-radius: 3px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: #007acc; cursor: pointer; border: 1px solid #569cd6;
}
.color-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.73rem; color: #888; margin-bottom: 8px;
}
#colorPreview {
  width: 22px; height: 22px; border-radius: 3px; border: 1px solid #666; flex-shrink: 0;
}
.divider { border: none; border-top: 1px solid #3a3a3a; margin: 6px 0; }
#status { font-size: 0.7rem; color: #6b7280; min-height: 1.2em; }
#gpu-error { color: #f87171; font-size: 0.85rem; padding: 10px; background: #2d1515; border-radius: 4px; display: none; }

    /* == Mobile responsive == */
    @media (max-width: 768px) {
      canvas { max-width: 100% !important; height: auto !important; }
      .viewport-container { width: 100% !important; height: auto !important; }
      .dx-body { padding: 10px !important; gap: 10px !important; }
      .control-panel { min-width: unset !important; width: 100% !important; max-height: none !important; }
      #imgui-panel { position: relative !important; top: auto !important; left: auto !important; width: calc(100% - 20px) !important; margin: 10px auto !important; max-height: 55vh; overflow-y: auto; }
    }

  </style>
</head>
<body>
<h2>렌더 타겟 클리어 색상 + 입력 이미지</h2>
<div class="tags">
  <span class="tag">WebGPU Compute</span>
  <span class="tag">Clear Color</span>
  <span class="tag">Render Target</span>
</div>
<div id="gpu-error"></div>
<div class="window-frame">
  <div class="title-bar">
    <div class="title-bar-dot tb-red"></div>
    <div class="title-bar-dot tb-yellow"></div>
    <div class="title-bar-dot tb-green"></div>
    DirectX 11 — ClearRenderTargetView + 입력 이미지
  </div>
  <div class="canvas-area">
    <canvas id="dstCanvas" width="480" height="300"></canvas>
  </div>
</div>
<div class="imgui-panel">
  <div class="imgui-title">Params (Uniform Buffer)</div>
  <div class="ctrl-row">
    <label>클리어 R <span id="valR">0.10</span></label>
    <input type="range" id="slR" min="0" max="1" step="0.01" value="0.1">
  </div>
  <div class="ctrl-row">
    <label>클리어 G <span id="valG">0.20</span></label>
    <input type="range" id="slG" min="0" max="1" step="0.01" value="0.2">
  </div>
  <div class="ctrl-row">
    <label>클리어 B <span id="valB">0.40</span></label>
    <input type="range" id="slB" min="0" max="1" step="0.01" value="0.4">
  </div>
  <div class="color-row">
    <div id="colorPreview"></div>
    클리어 색상 미리보기 (ClearRenderTargetView 배경)
  </div>
  <hr class="divider">
  <div class="ctrl-row">
    <label>이미지 오프셋 X <span id="valOX">80</span></label>
    <input type="range" id="slOX" min="0" max="200" step="1" value="80">
  </div>
  <div class="ctrl-row">
    <label>이미지 오프셋 Y <span id="valOY">50</span></label>
    <input type="range" id="slOY" min="0" max="100" step="1" value="50">
  </div>
</div>
<div id="status">WebGPU 초기화 중...</div>

<script>
const SW = 480, SH = 300;
const IW = 160, IH = 120;

let pending = false;
function scheduleRender() {
  if (!pending) { pending = true; requestAnimationFrame(() => { pending = false; doRender(); }); }
}

let device, computePipeline, uniformBuf, inputTex, outputTex, bindGroup;
let renderPipeline, renderBG, renderCtx;
let cr = 0.1, cg = 0.2, cb = 0.4, ox = 80, oy = 50;

// Procedural 160x120 image with partial transparency
function makeInputImageData() {
  const offscreen = document.createElement('canvas');
  offscreen.width = IW; offscreen.height = IH;
  const ctx = offscreen.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, IW, IH);
  grad.addColorStop(0, '#6b21a8');
  grad.addColorStop(1, '#0d9488');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, IW, IH);

  // White circle
  ctx.beginPath();
  ctx.arc(IW/2, IH/2, 36, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();

  // "DX11" text
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 22px Segoe UI, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('DX11', IW/2, IH/2);

  // Transparent corners (simulate alpha border)
  ctx.globalCompositeOperation = 'destination-out';
  const cornerR = 22;
  [[0,0],[IW,0],[0,IH],[IW,IH]].forEach(([cx, cy]) => {
    const cg2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, cornerR);
    cg2.addColorStop(0, 'rgba(0,0,0,1)');
    cg2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg2;
    ctx.fillRect(cx - cornerR, cy - cornerR, cornerR*2, cornerR*2);
  });
  ctx.globalCompositeOperation = 'source-over';

  return ctx.getImageData(0, 0, IW, IH);
}

const COMPUTE_WGSL = `
struct Params {
  clearColor: vec4f,
  offset: vec4f,
}
@group(0) @binding(0) var<uniform> p: Params;
@group(0) @binding(1) var src: texture_2d<f32>;
@group(0) @binding(2) var dst: texture_storage_2d<rgba8unorm, write>;

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3u) {
  if (id.x >= ${SW}u || id.y >= ${SH}u) { return; }
  // DX11: ClearRenderTargetView — fill with clear color
  var col = vec4f(p.clearColor.rgb, 1.0);
  // Check if pixel falls within input image bounds
  let ix = i32(id.x) - i32(p.offset.x);
  let iy = i32(id.y) - i32(p.offset.y);
  if (ix >= 0 && iy >= 0 && ix < ${IW} && iy < ${IH}) {
    let imgPx = textureLoad(src, vec2i(ix, iy), 0);
    col = vec4f(mix(col.rgb, imgPx.rgb, imgPx.a), 1.0);
  }
  textureStore(dst, vec2i(i32(id.x), i32(id.y)), col);
}`;

const VERT_WGSL = `
struct V { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
@vertex fn main(@builtin(vertex_index) vi: u32) -> V {
  var p = array<vec2f,6>(
    vec2f(-1,-1),vec2f(1,-1),vec2f(-1,1),
    vec2f(-1,1),vec2f(1,-1),vec2f(1,1));
  var u = array<vec2f,6>(
    vec2f(0,1),vec2f(1,1),vec2f(0,0),
    vec2f(0,0),vec2f(1,1),vec2f(1,0));
  var o: V; o.pos = vec4f(p[vi],0,1); o.uv = u[vi]; return o;
}`;

const FRAG_WGSL = `
@group(0) @binding(0) var s: sampler;
@group(0) @binding(1) var t: texture_2d<f32>;
struct V { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
@fragment fn main(v: V) -> @location(0) vec4f { return textureSample(t, s, v.uv); }`;

async function init() {
  if (!navigator.gpu) { showError('WebGPU를 지원하지 않는 브라우저입니다.'); return; }
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) { showError('WebGPU 어댑터를 찾을 수 없습니다.'); return; }
  device = await adapter.requestDevice();

  const imgData = makeInputImageData();

  inputTex = device.createTexture({
    size: [IW, IH], format: 'rgba8unorm',
    usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST | GPUTextureUsage.RENDER_ATTACHMENT
  });
  device.queue.writeTexture({ texture: inputTex }, imgData.data,
    { bytesPerRow: IW * 4, rowsPerImage: IH }, [IW, IH]);

  outputTex = device.createTexture({
    size: [SW, SH], format: 'rgba8unorm',
    usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
  });

  // 2 vec4f = 32 bytes
  uniformBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

  const bgl = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
    { binding: 1, visibility: GPUShaderStage.COMPUTE, texture: { sampleType: 'float' } },
    { binding: 2, visibility: GPUShaderStage.COMPUTE, storageTexture: { format: 'rgba8unorm' } }
  ]});

  computePipeline = device.createComputePipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
    compute: { module: device.createShaderModule({ code: COMPUTE_WGSL }), entryPoint: 'main' }
  });

  bindGroup = device.createBindGroup({ layout: bgl, entries: [
    { binding: 0, resource: { buffer: uniformBuf } },
    { binding: 1, resource: inputTex.createView() },
    { binding: 2, resource: outputTex.createView() }
  ]});

  const dstCanvas = document.getElementById('dstCanvas');
  renderCtx = dstCanvas.getContext('webgpu');
  const fmt = navigator.gpu.getPreferredCanvasFormat();
  renderCtx.configure({ device, format: fmt, alphaMode: 'opaque' });

  const renderBGL = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
    { binding: 1, visibility: GPUShaderStage.FRAGMENT, texture: {} }
  ]});
  renderPipeline = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [renderBGL] }),
    vertex: { module: device.createShaderModule({ code: VERT_WGSL }), entryPoint: 'main' },
    fragment: { module: device.createShaderModule({ code: FRAG_WGSL }), entryPoint: 'main',
      targets: [{ format: fmt }] },
    primitive: { topology: 'triangle-list' }
  });
  const samp = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
  renderBG = device.createBindGroup({ layout: renderBGL, entries: [
    { binding: 0, resource: samp },
    { binding: 1, resource: outputTex.createView() }
  ]});

  setupUI();
  doRender();
  document.getElementById('status').textContent = 'WebGPU 초기화 완료 ✓  |  ClearRenderTargetView 시뮬레이션';
}

function updateColorPreview() {
  const r = Math.round(cr * 255);
  const g = Math.round(cg * 255);
  const b = Math.round(cb * 255);
  document.getElementById('colorPreview').style.background = `rgb(${r},${g},${b})`;
}

function doRender() {
  if (!device) return;
  device.queue.writeBuffer(uniformBuf, 0, new Float32Array([cr, cg, cb, 1, ox, oy, 0, 0]));
  const enc = device.createCommandEncoder();
  const cp = enc.beginComputePass();
  cp.setPipeline(computePipeline);
  cp.setBindGroup(0, bindGroup);
  cp.dispatchWorkgroups(Math.ceil(SW/8), Math.ceil(SH/8));
  cp.end();
  const rp = enc.beginRenderPass({ colorAttachments: [{
    view: renderCtx.getCurrentTexture().createView(),
    clearValue: {r:0,g:0,b:0,a:1}, loadOp: 'clear', storeOp: 'store'
  }]});
  rp.setPipeline(renderPipeline);
  rp.setBindGroup(0, renderBG);
  rp.draw(6);
  rp.end();
  device.queue.submit([enc.finish()]);
}

function setupUI() {
  function bind(id, valId, setter, decimals=2) {
    const sl = document.getElementById(id);
    const vl = document.getElementById(valId);
    sl.addEventListener('input', () => {
      const v = parseFloat(sl.value);
      vl.textContent = decimals === 0 ? v.toFixed(0) : v.toFixed(decimals);
      setter(v);
      updateColorPreview();
      scheduleRender();
    });
  }
  bind('slR', 'valR', v => { cr = v; });
  bind('slG', 'valG', v => { cg = v; });
  bind('slB', 'valB', v => { cb = v; });
  bind('slOX', 'valOX', v => { ox = v; }, 0);
  bind('slOY', 'valOY', v => { oy = v; }, 0);
  updateColorPreview();
}

function showError(msg) {
  const el = document.getElementById('gpu-error');
  el.style.display = 'block'; el.textContent = msg;
  document.getElementById('status').textContent = '';
}

init().catch(e => showError('오류: ' + e.message));
</script>
</body>
</html>
